<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portfolio — Patrick Diamitani · Enterprise AI Production · Diamitani Industries</title>
<meta name="description" content="The full Patrick Diamitani portfolio: 16 production AI systems, 40+ Claude skills, consulting, holdings, research, and civic work. A division of Diamitani Industries.">
<link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050508; --bg-2:#0c0d12; --panel:#12131a; --ink:#e6e6e8; --ink-soft:#b4b5bb;
  --muted:#8c8d93; --border:#1e1f26; --gold:#c9a227; --gold-soft:#e0c25a;
  --success:#4ea87a; --cyan:#5eb8c4; --rose:#d48aa8;
  --radius:10px; --shadow:0 14px 32px rgba(0,0,0,.45);
  --font-serif:"Playfair Display",Georgia,serif;
  --font-body:"Source Sans 3",system-ui,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font-body);line-height:1.65;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{font-family:var(--font-serif);line-height:1.15;color:var(--ink);text-wrap:balance}
button{font-family:var(--font-body)}
#app{max-width:100%;overflow-x:hidden}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}}

/* ── Nav ── */
.nav{position:sticky;top:0;z-index:200;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:0 28px;height:60px;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-wrap:wrap}
.brand{font-family:var(--font-serif);font-weight:600;font-size:16px;display:flex;align-items:center;gap:8px;cursor:pointer;background:none;border:none;color:var(--ink)}
.brand-div{color:var(--gold)}
.brand-sub{font-family:var(--font-body);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.nav-links{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--ink-soft)}
.nav-links a,.nav-links button{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:6px 10px;border-radius:6px;transition:color .15s,background .15s;white-space:nowrap}
.nav-links a:hover,.nav-links button:hover{color:var(--ink);background:color-mix(in srgb,var(--gold) 8%,transparent)}
.nav-links a.active,.nav-links button.active{color:var(--gold)}
.nav-sep{width:1px;height:14px;background:var(--border);margin:0 4px;flex-shrink:0}
.nav-home{border:1px solid var(--border)!important;border-radius:999px!important;padding:5px 13px!important}
.nav-home:hover{border-color:var(--gold)!important}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border-radius:8px;font-weight:600;font-size:14px;transition:transform .15s,box-shadow .15s,opacity .15s;cursor:pointer;border:none}
.btn-primary{background:var(--gold);color:#05050a;box-shadow:0 4px 14px color-mix(in srgb,var(--gold) 28%,transparent)}
.btn-primary:hover{transform:translateY(-2px);opacity:.92}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--ink-soft)}
.btn-ghost:hover{color:var(--gold);border-color:var(--gold)}
.btn-accent{background:var(--cyan);color:#05050a}
.btn-accent:hover{transform:translateY(-2px);opacity:.92}
.btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ── Animations ── */
.view{animation:fade-in .35s ease}
@keyframes fade-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── Hero ── */
.hero{position:relative;padding:96px 28px 64px;text-align:center;background:radial-gradient(120% 100% at 50% 0,color-mix(in srgb,var(--gold) 8%,var(--bg-2)) 0,var(--bg-2) 42%,var(--bg) 100%);border-bottom:1px solid var(--border);overflow:hidden}
.hero-inner{max-width:800px;margin:0 auto}
.hero-eyebrow{font-size:11px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;margin-bottom:18px;font-weight:600}
.hero h1{font-size:clamp(36px,7vw,62px);font-weight:600;letter-spacing:-.01em;line-height:1.1}
.hero-tagline{color:var(--ink-soft);font-size:17px;max-width:620px;margin:20px auto 0;line-height:1.6}
.hero-stats{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:36px 0 28px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 22px;min-width:120px}
.stat-n{font-family:var(--font-serif);font-size:24px;font-weight:600;color:var(--gold);font-variant-numeric:tabular-nums}
.stat-l{font-size:11px;color:var(--muted);margin-top:4px}
.hero-cta{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}

/* ── Section layout ── */
.section{padding:72px 28px;border-bottom:1px solid var(--border)}
.section-dark{padding:72px 28px;background:var(--bg-2);border-bottom:1px solid var(--border)}
.section-inner{max-width:1160px;margin:0 auto}
.sl{font-size:10px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px;font-weight:600;font-family:var(--font-mono)}
.section h2{font-size:clamp(26px,4vw,36px);font-weight:600;letter-spacing:-.01em;margin-bottom:10px}
.section h2 em,.section-dark h2 em{font-family:var(--font-serif);font-style:italic;font-weight:400;color:var(--gold)}
.section-dark h2{font-size:clamp(26px,4vw,36px);font-weight:600;letter-spacing:-.01em;margin-bottom:10px}
.section-sub{color:var(--muted);font-size:15.5px;max-width:560px;margin-bottom:36px;line-height:1.55}

/* ── Filter bar ── */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{background:var(--panel);border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.filter-btn:hover{color:var(--gold)}
.filter-btn.active{background:var(--gold);color:#05050a;border-color:var(--gold)}

/* ── System cards (case studies) ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.card{display:flex;flex-direction:column;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:22px;transition:transform .18s,box-shadow .18s;position:relative;text-align:left;cursor:pointer;color:inherit}
.card::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;border-radius:var(--radius) var(--radius) 0 0;background:var(--cat-color,var(--gold))}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.card-top{display:flex;justify-content:space-between;align-items:center}
.card h3{font-size:17px;font-weight:600;font-family:var(--font-serif)}
.card-blurb{color:var(--ink-soft);font-size:13px;flex-grow:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11.5px;color:var(--muted);border-top:1px solid var(--border);padding-top:10px}
.card-cta{color:var(--gold);font-weight:600;white-space:nowrap}

/* ── Badge ── */
.badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px;letter-spacing:.02em}
.type-badge{background:var(--bg-2);border:1px solid var(--border);color:var(--ink-soft)}
.status-badge{background:color-mix(in srgb,var(--success) 12%,transparent);color:var(--success);border:1px solid color-mix(in srgb,var(--success) 35%,transparent)}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;color:var(--muted);background:var(--bg-2);border:1px solid var(--border);padding:3px 8px;border-radius:5px}
.chip{font-size:11px;color:var(--ink);background:var(--bg-2);border:1px solid var(--border);padding:4px 10px;border-radius:999px}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.empty{text-align:center;color:var(--muted);padding:56px 0}

/* ── Skill cards ── */
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.skill-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:9px;transition:transform .18s,border-color .18s}
.skill-card:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--gold) 45%,var(--border))}
.skill-cat{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--skill-color,var(--muted));font-weight:600}
.skill-card h3{font-size:15px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.skill-card p{font-size:12.5px;color:var(--ink-soft);line-height:1.5;flex:1}
.skill-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.skill-tag{font-size:10px;color:var(--muted);background:var(--bg-2);border:1px solid var(--border);padding:2px 7px;border-radius:4px}

/* ── Company/Holdings grid ── */
.holdings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.holding-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;gap:8px;text-decoration:none;color:inherit;transition:transform .18s,border-color .18s;position:relative;overflow:hidden}
.holding-card::before{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 0 0,color-mix(in srgb,var(--hc,var(--gold)) 10%,transparent),transparent 60%);pointer-events:none}
.holding-card:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--hc,var(--gold)) 55%,var(--border))}
.holding-type{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
.holding-card h3{font-size:17px;font-weight:600;letter-spacing:-.01em}
.holding-card p{font-size:13px;color:var(--ink-soft);line-height:1.5;flex:1}
.holding-link{font-size:12px;color:var(--gold);font-weight:600;margin-top:4px}

/* ── Research card ── */
.research-block{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:36px;max-width:820px}
.research-block .doi{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:8px}
.research-block p{color:var(--ink-soft);font-size:14.5px;line-height:1.65;margin:18px 0;max-width:68ch}
.pillars{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin:20px 0}
.pillar{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:14px}
.pillar-name{font-family:var(--font-mono);font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:4px}
.pillar p{font-size:12.5px;color:var(--muted);line-height:1.45;margin:0}

/* ── Consulting / About ── */
.two-col{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
.consult-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:34px;text-decoration:none;color:inherit;display:block;transition:transform .2s,border-color .2s;position:relative;overflow:hidden}
.consult-card::before{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 100% 0,color-mix(in srgb,var(--cc,var(--gold)) 14%,transparent),transparent 55%);pointer-events:none}
.consult-card:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--cc,var(--gold)) 50%,var(--border))}
.consult-card .ct{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px}
.consult-card h3{font-family:var(--font-serif);font-style:italic;font-size:clamp(26px,3vw,34px);letter-spacing:-.02em;margin:6px 0 12px}
.consult-card p{font-size:14px;color:var(--ink-soft);line-height:1.55;margin-bottom:14px;max-width:38ch}
.consult-card .cl{font-size:13px;color:var(--gold);font-weight:600}
.consult-card .metric-line{font-family:var(--font-mono);font-size:10px;color:var(--muted);border-top:1px solid var(--border);padding-top:10px;margin:14px 0}

.about-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:48px;align-items:start}
.about-portrait{width:100%;aspect-ratio:3/4;background:linear-gradient(145deg,color-mix(in srgb,var(--gold) 8%,transparent),transparent 50%),linear-gradient(135deg,#1a1816,#12131a);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:64px;color:var(--muted);font-style:italic}
.about-body p{color:var(--ink-soft);font-size:14.5px;line-height:1.7;margin-bottom:12px}
.about-body strong{color:var(--ink)}
.about-quote{border-left:3px solid var(--gold);padding:12px 20px;margin:20px 0;font-family:var(--font-serif);font-style:italic;font-size:17px;color:var(--ink);line-height:1.45}
.highlights-list{list-style:none;display:flex;flex-direction:column;gap:10px;margin-top:20px}
.highlights-list li{position:relative;padding-left:20px;color:var(--ink-soft);font-size:13.5px;line-height:1.5}
.highlights-list li::before{content:"—";position:absolute;left:0;color:var(--gold);font-weight:700}

/* ── Contact CTA ── */
.contact-section{padding:76px 28px;text-align:center;background:var(--gold)}
.contact-section h2,.contact-inner p{color:#05050a}
.contact-inner p{max-width:520px;margin:0 auto 24px;font-size:15px;opacity:.9}
.contact-links{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.contact-section .btn-primary{background:#05050a;color:var(--gold)}
.contact-section .btn-ghost{border-color:rgba(5,5,10,.25);color:#05050a}

/* ── Product detail ── */
.product-page{max-width:1040px;margin:0 auto;padding:36px 28px 84px}
.crumbs{font-size:12px;color:var(--muted);margin-bottom:20px;display:flex;gap:8px;align-items:center}
.crumbs button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0}
.crumbs button:hover{color:var(--gold)}
.product-hero{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.product-hero h1{font-size:clamp(26px,5vw,40px);font-weight:600;letter-spacing:-.01em}
.tagline{color:var(--ink-soft);font-size:15.5px;margin:12px 0 14px;max-width:68ch}
.metric-callout{display:inline-block;font-weight:600;color:var(--success);background:color-mix(in srgb,var(--success) 10%,transparent);border:1px solid color-mix(in srgb,var(--success) 30%,transparent);border-radius:8px;padding:8px 14px;margin-bottom:14px;font-size:13.5px}
.product-body{display:grid;grid-template-columns:1fr 270px;gap:24px;align-items:start}
.side-panel{display:flex;flex-direction:column;gap:12px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.panel h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;font-family:var(--font-body);font-weight:700}
.panel-cta p{font-size:12px;color:var(--ink-soft);margin-bottom:12px}
.panel-cta .btn{width:100%}
.req-list{list-style:none;display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:var(--ink-soft)}
.req-list li::before{content:"\2713 ";color:var(--success);font-weight:700}
.onesheet{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px}
.onesheet h2{font-size:18px;margin:24px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.onesheet h2:first-child{margin-top:0}
.onesheet h3{font-size:15px;margin:18px 0 8px;font-family:var(--font-body);font-weight:700}
.onesheet p{color:var(--ink-soft);font-size:14px;margin-bottom:10px}
.onesheet ul,.onesheet ol{margin:0 0 12px 20px;color:var(--ink-soft);font-size:14px;display:flex;flex-direction:column;gap:5px}
.onesheet strong{color:var(--ink)}
.onesheet code{font-family:var(--font-mono);font-size:11.5px;background:var(--bg-2);border:1px solid var(--border);padding:2px 5px;border-radius:4px;color:var(--gold)}
.onesheet hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.table-wrap{overflow-x:auto;margin:12px 0 16px;border:1px solid var(--border);border-radius:8px}
.onesheet table{width:100%;border-collapse:collapse;font-size:12.5px}
.onesheet th{text-align:left;background:var(--bg-2);color:var(--muted);font-weight:700;padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.onesheet td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--ink-soft);vertical-align:top}
.onesheet tr:last-child td{border-bottom:none}

/* ── Footer ── */
.footer{border-top:1px solid var(--border);padding:24px 28px;background:var(--bg-2)}
.footer-inner{max-width:1160px;margin:0 auto;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted)}

/* ── Responsive ── */
@media(max-width:860px){
  .product-body{grid-template-columns:1fr}
  .onesheet{padding:20px 16px}
  .two-col,.about-grid{grid-template-columns:1fr}
  .nav-links a:not(.nav-home):not(.nav-active){display:none}
}
@media(max-width:640px){
  .hero{padding:72px 16px 48px}
  .section,.section-dark{padding:52px 16px}
}
</style>
</head>

<body>
<div id="app">
  <nav class="nav">
    <button class="brand" id="nav-brand">Patrick Diamitani<span class="brand-div">/</span><span class="brand-sub">Portfolio</span></button>

<script>
const viewRoot = document.getElementById("view-root");
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML}

/* ── Skills data ── */
const SKILLS = [
  // Framework & Methodology
  {name:"PAL — Prompt Abstraction Layer",slug:"pal",cat:"Framework",color:"#c9a227",
   desc:"A compiler-inspired meta-layer that automatically rewrites every vague or casual message into a structured, model-specific, deployment-ready prompt. Runs on every input before any model sees it.",
   what:"Sits in front of all Claude interactions. Compiles intent → composition → optimization → runtime instructions. Eliminates token waste and improves first-shot success on every task.",
   stack:["Claude","Prompt Engineering","ROSTR"],
   triggers:["any vague prompt","casual message","before any skill runs"],
   tags:["Claude","ROSTR","Meta-Layer"]},

  {name:"ROSTR Builder",slug:"rostr-builder",cat:"Framework",color:"#c9a227",
   desc:"Enforces ROSTR architecture (PAL + NPAO + RAG/DAL + ContextEngine) on all agent, skill, automation, and workflow builds. Every output inherits the framework's production discipline.",
   what:"Takes any build description and produces a properly structured skill file, agent manifest, or automation spec following the ROSTR methodology. The quality gate for everything in the library.",
   stack:["Claude","ROSTR","Framework Design"],
   triggers:["build me a skill","create an agent","design a workflow"],
   tags:["Claude","ROSTR","Framework"]},

  {name:"JTBD Builder",slug:"jtbd-builder",cat:"Framework",color:"#c9a227",
   desc:"Runs any input through the full PAL compilation pipeline (Intent → Composition → Optimization → Runtime) to produce implementable Jobs-to-be-Done blueprints for AI agents and automations.",

  const integ = (p.integrations||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join("");
  const reqs = (p.requirements||[]).map(r=>`<li>${esc(r)}</li>`).join("");
  viewRoot.innerHTML = `
  <main class="product-page view" style="--cat-color:${p.color}">
    <div class="crumbs"><button data-back>← Back to portfolio</button> <span>/</span> <span>${esc(p.category)}</span></div>
    <header class="product-hero">
      <div class="badge-row"><span class="badge type-badge">${esc(p.type_label)}</span><span class="badge status-badge">${esc(p.status)}</span></div>
      <h1>${esc(p.name)}</h1>
      <p class="tagline">${esc(p.tagline)}</p>
      <div class="metric-callout">${esc(p.headline_metric)}</div>
      <div class="tags">${tags}</div>
    </header>
    <div class="product-body">
      <article class="onesheet">${p.onesheet_html}</article>
      <aside class="side-panel">
        <div class="panel"><h3>Stack & Integrations</h3><div class="chips">${integ}</div></div>
        <div class="panel"><h3>What It Needs</h3><ul class="req-list">${reqs}</ul></div>
        <div class="panel panel-cta">
          <h3>Discuss this build</h3>
          <p>Happy to walk through the architecture, the failures, or how this translates to your team.</p>
          <a class="btn btn-primary" href="mailto:pdiamitani@atlashxm.com?subject=Portfolio%3A%20${encodeURIComponent(p.name)}">Email Patrick</a>
        </div>
      </aside>
    </div>
  </main>`;
  window.scrollTo({top:0,behavior:"instant"});
  viewRoot.querySelector("[data-back]")?.addEventListener("click",()=>{history.back();});
}

function router(){
  const hash = location.hash||"";
  const mp = hash.match(/^#\/p\/(.+)$/);
  const ms = hash.match(/^#\/s\/(.+)$/);
  const mw = hash.match(/^#\/w\/(.+)$/);
  if(mp){ renderProduct(decodeURIComponent(mp[1])); }
  else if(ms){ renderSkillDetail(decodeURIComponent(ms[1])); }
  else if(mw){ renderWorkflowDetail(decodeURIComponent(mw[1])); }
  else{
    renderHome();
    if(hash&&hash!=="#"){
      requestAnimationFrame(()=>{
        const t=document.querySelector(hash);
        t?.scrollIntoView({behavior:"smooth",block:"start"});
      });
    }
  }
}

window.addEventListener("hashchange",router);
document.getElementById("nav-brand").addEventListener("click",()=>{location.hash="";window.scrollTo({top:0,behavior:"smooth"})});
document.getElementById("nav-systems").addEventListener("click",()=>{location.hash="#systems"});
document.getElementById("nav-skills").addEventListener("click",()=>{location.hash="#skills"});
document.getElementById("nav-workflows").addEventListener("click",()=>{location.hash="#workflows"});
document.getElementById("nav-consulting").addEventListener("click",()=>{location.hash="#consulting"});
document.getElementById("nav-holdings").addEventListener("click",()=>{location.hash="#holdings"});
document.getElementById("nav-research").addEventListener("click",()=>{location.hash="#research"});
document.getElementById("nav-about").addEventListener("click",()=>{location.hash="#about"});

router();
</script>
</body>
