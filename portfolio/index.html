osis</strong> \u2192 analysis could &quot;sound right&quot; without evidence \u2192 hard charter: every metric traceable to a real execution ID, absent data rendered as null, alerts dry-run by default.</li>\n<li><strong>Large execution histories</strong> \u2192 full pulls risk rate limits \u2192 cursor pagination with backoff + resume; partial archives explicitly flagged.</li>\n<li><strong>Safety of pointing tools at production</strong> \u2192 strict GET-only design: the orchestrating agent never calls a write endpoint; no auto-remediation in v1.</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>SRE instincts applied to business automation \u00b7 read-only-by-design safety \u00b7 grounded (no-fabrication) AI analysis \u00b7 the maturity step from building automations to operating a platform.</p>", "type_label": "Platform", "color": "#5c6b7a", "portfolio_blurb": "When an automation failed or quietly stalled, the team found out only when data stopped moving, then diagnosed it by clicking through runs one at a time. A read-only observability layer now targets cutting diagnosis time from 10-15 minutes to under 60 seconds, with a hard no-fabrication charter on every claim.", "demonstrates_short": "SRE instincts for automation", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The const viewRoot = document.getElementById("view-root");

function esc(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

function renderHome() {
  const n = SITE.products.length;
  const live = SITE.products.filter(p => (p.status || "").toLowerCase().includes("live")).length;

  const highlights = SITE.highlights.map(h => `<li>${h}</li>`).join("");
  const approach = SITE.approach.map(a => `<div class="approach-card"><h3>${esc(a.title)}</h3><p>${a.desc}</p></div>`).join("");
  const cats = SITE.categories;
  const catButtons = cats.map(c => `<button class="filter-btn" data-cat="${esc(c)}">${esc(c)}</button>`).join("");

  const cards = SITE.products.map(p => {
    const blurb = p.portfolio_blurb || p.description_short || "";
    const searchBlob = `${p.name} ${p.tagline} ${(p.tags || []).join(" ")}`.toLowerCase();
    return `
    <button class="card" style="--cat-color:${p.color}" data-cat="${esc(p.category)}" data-search="${esc(searchBlob)}" data-slug="${p.slug}">
      <div class="card-top">
        <span class="badge type-badge">${esc(p.type_label)}</span>
        <span class="badge status-badge">${esc(p.status)}</span>
      </div>
      <h3>${esc(p.name)}</h3>
      <p class="card-blurb">${esc(blurb)}</p>
      <div class="card-footer">
        <span class="card-demo">${esc(p.demonstrates_short || "")}</span>
        <span class="card-cta">Read the build →</span>
      </div>
    </button>`;
  }).join("");

  viewRoot.innerHTML = `
  <div class="view">
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-eyebrow">Enterprise AI Production · Agent Skills &amp; Product Library</div>
        <h1>Patrick Diamitani</h1>
        <p class="hero-tagline">${esc(SITE.hero)}</p>
        <div class="hero-stats">
          <div class="stat"><div class="stat-n">${n}</div><div class="stat-l">Systems in the library</div></div>
          <div class="stat"><div class="stat-n">${live}</div><div class="stat-l">Live in production</div></div>
          <div class="stat"><div class="stat-n">50+</div><div class="stat-l">Daily non-technical users</div></div>

        <div class="hero-cta-row">
          <a href="#library" class="btn btn-primary" data-nav="library">View the library ↓</a>
          <a href="#about" class="btn btn-ghost" data-nav="about">About Patrick</a>
        </div>
      </div>
    </header>

    <section id="about" class="about-section">
      <div class="about-inner">
        <h2>About</h2>
        <div class="about-text">${SITE.aboutHtml}</div>
        <div class="highlights-block">
          <h3>Career Highlights</h3>
          <ul class="highlights-list">${highlights}</ul>
        </div>
      </div>
    </section>

    <section class="approach-section">
      <div class="about-inner">
        <h2>Approach</h2>
        <div class="approach-grid">${approach}</div>
      </div>
    </section>

    <main id="library" class="library">
      <div class="library-head">
        <h2>Skill &amp; Product Library</h2>
        <input id="search" type="search" placeholder="Search the library…" aria-label="Search products">
      </div>

        <button class="filter-btn active" data-cat="all">All (${n})</button>
        ${catButtons}
      </div>
      <div class="grid" id="grid">${cards}</div>
      <div id="empty" class="empty" hidden>No systems match — try another search.</div>
    </main>

    <section id="contact" class="contact-section">
      <div class="about-inner contact-inner">
        <h2>Let's talk</h2>
        <p>${esc(SITE.contact)}</p>
        <div class="contact-links">
          <a class="btn btn-primary" href="mailto:pdiamitani@atlashxm.com">Email</a>
          <a class="btn btn-ghost" href="https://linkedin.com/in/diamitani" target="_blank" rel="noopener">LinkedIn ↗</a>
        </div>
      </div>
    </section>
  </div>`;

  const grid = document.getElementById("grid");
  const cardEls = Array.from(grid.querySelectorAll(".card"));
  const filterBtns = Array.from(document.querySelectorAll(".filter-btn"));
  const search = document.getElementById("search");
  const empty = document.getElementById("empty");
  let activeCat = "all";

  function apply() {
    const q = (search?.value || "").trim().toLowerCase();
    let visible = 0;
    cardEls.forEach((c) => {
      const okCat = activeCat === "all" || c.dataset.cat === activeCat;
      const okQ = !q || (c.dataset.search || "").includes(q);
      const show = okCat && okQ;
      c.style.display = show ? "" : "none";
      if (show) visible++;
    });
    if (empty) empty.hidden = visible !== 0;
  }
  filterBtns.forEach((b) => b.addEventListener("click", () => {
    filterBtns.forEach((x) => x.classList.remove("active"));
    b.classList.add("active");
    activeCat = b.dataset.cat;
    apply();
  }));
  search?.addEventListener("input", apply);
  cardEls.forEach((c) => c.addEventListener("click", () => { location.hash = `#/p/${c.dataset.slug}`; }));
  viewRoot.querySelectorAll("[data-nav]").forEach((el) => el.addEventListener("click", (e) => {
    // let the hash-based smooth scroll happen after render
  }));

  const reqs = (p.requirements || []).map(r => `<li>${esc(r)}</li>`).join("");

  viewRoot.innerHTML = `

        <div class="panel panel-cta">

          <p>Happy to walk through the architecture, the failures along the way, or how this could translate to your team.</p>
          <a class="btn btn-primary" href="mailto:pdiamitani@atlashxm.com?subject=Portfolio%3A%20${encodeURIComponent(p.name)}">Email Patrick</a>
        </div>
      </aside>
    </div>
  </main>`;
  window.scrollTo({ top: 0, behavior: "instant" });
  const back = viewRoot.querySelector("[data-back]");
  back?.addEventListener("click", () => { location.hash = "#library"; });
}

function router() {
  const hash = location.hash || "";
  const m = hash.match(/^#\/p\/(.+)$/);
  if (m) {
    renderProduct(decodeURIComponent(m[1]));
  } else {
    renderHome();
    if (hash && hash !== "#") {
      requestAnimationFrame(() => {
        const target = document.querySelector(hash);
        target?.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }
  }
}

window.addEventListener("hashchange", router);
document.getElementById("nav-brand").addEventListener("click", () => { location.hash = ""; window.scrollTo({top:0, behavior:"smooth"}); });
document.getElementById("nav-about").addEventListener("click", () => { location.hash = "#about"; });
document.getElementById("nav-library").addEventListener("click", () => { location.hash = "#library"; });
document.getElementById("nav-contact").addEventListener("click", () => { location.hash = "#contact"; });

const root = document.documentElement;
document.getElementById("theme-toggle").addEventListener("click", () => {
  const current = root.getAttribute("data-theme") ||
    (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  root.setAttribute("data-theme", current === "dark" ? "light" : "dark");
});

router();
</script>
