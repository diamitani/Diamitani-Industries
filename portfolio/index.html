e compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "post-sales-call-automation", "name": "Post-Sales Call Automation", "tagline": "Four AI agents on every sales call \u2014 follow-up email, missed questions, competitor intel, and a CRM note, with zero rep action.", "category": "Sales Automation", "type": "n8n Workflow", "status": "Live in production", "price": "Free", "tags": ["n8n", "Azure OpenAI", "HubSpot", "Avoma", "Azure Blob Storage", "Outlook", "multi-agent", "sales follow-up"], "headline_metric": "Every sales call \u2192 5 AI deliverables, zero rep action", "description_short": "Always-on multi-agent pipeline that turns every recorded sales call into a country-aware follow-up email, missed-questions analysis, competitor intel, LinkedIn draft, and CRM note \u2014 automatically.", "description_long": "An always-on, multi-agent pipeline that turns every recorded sales call into a rep-ready follow-up package. Triggered by a webhook after each call, it pulls the Avoma transcript, detects which countries the buyer wants to hire in, fetches exact country employment-law files from Azure Blob Storage, and runs four AI agents: a consultative 'If I Were You' follow-up email, a missed-questions analysis, competitor research, and a LinkedIn draft \u2014 then emails the rep via Outlook and logs a note to the HubSpot deal. Built for a global HR-tech (EOR) platform where country-specific facts win deals. Result: five deliverables per call, zero rep action.", "integrations": ["n8n", "Avoma", "Azure OpenAI", "Azure Blob Storage", "HubSpot", "Microsoft Outlook"], "requirements": ["n8n cloud workspace with webhooks enabled", "Avoma API access (read meetings/transcripts)", "Azure OpenAI deployment + credential", "Azure Blob Storage container with country data files (ISO-3 named)", "HubSpot private app (deals/contacts read, notes write)", "Microsoft 365 / Outlook OAuth connection"], "setup_time": "~2-4 hours", "onesheet_html": "<h3>Overview</h3>\n<p>An always-on, multi-agent pipeline that turns every recorded sales call into a rep-ready follow-up package. Triggered by a webhook after each call, it pulls the Avoma transcript, detects which countries the buyer wants to hire in, fetches exact country employment-law files from Azure Blob Storage, and runs four AI agents: a consultative &quot;If I Were You&quot; follow-up email, a missed-questions analysis, competitor research, and a LinkedIn draft \u2014 then emails the rep via Outlook and logs a note to the HubSpot deal. Built for a global HR-tech (EOR) platform where country-specific facts win deals. Result: five deliverables per call, zero rep action.</p>\n<h3>The Problem</h3>\n<p>At a global HR-tech (EOR) platform (~500 employees, operating in 160+ countries), reps left sales calls without consistent follow-ups, missed buyer questions went unnoticed, and country-specific facts \u2014 the heart of Employer-of-Record selling \u2014 varied from rep to rep. Follow-up quality depended entirely on individual discipline.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>Webhook trigger (Avoma \u2192 n8n cloud)</strong> \u2014 a call-recording webhook fires after every sales call; n8n is a workflow-automation platform that runs the pipeline always-on, regardless of whose laptop is off.</li>\n<li><strong>Meeting guard + transcript polling</strong> \u2014 a completed-meeting check skips future/scheduled meetings; a bounded wait loop (20 polls \u00d7 2 min, ~40 min budget) retries until the transcript is ready, then exits gracefully instead of dead-ending.</li>\n<li><strong>Country extraction \u2192 ISO-3 codes</strong> \u2014 an LLM step reads the transcript and extracts only countries with real hiring intent (max 8, hard cap 10), mapping each to its ISO-3 code (Germany \u2192 DEU).</li>\n<li><strong>Deterministic country-data fetch</strong> \u2014 exact files are pulled from Azure Blob Storage (<code>country-data/&lt;ISO3&gt;.md</code>, 250+ countries) \u2014 cloud file storage, anonymous read, no index, no tokens to rotate. A context-builder step strips internal noise before injection.</li>\n<li><strong>Four Azure OpenAI agents</strong> \u2014 enterprise-hosted GPT models draft the follow-up email, missed-questions analysis, competitor research, and LinkedIn post, each with an explicit &quot;specificity requirement&quot; (cite concrete facts like &quot;13th-month pay split 50% June / 50% December,&quot; never generic filler).</li>\n<li><strong>Delivery</strong> \u2014 Outlook (Microsoft&#x27;s email service) sends the package to the rep and sales leadership; the HubSpot API logs a note to the associated deal.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>n8n (cloud)</td><td>Workflow engine, always-on</td><td>n8n cloud workspace, webhook enabled</td></tr>\n<tr><td>Avoma</td><td>Call recording + transcript API</td><td>Avoma API key (read meetings/transcripts)</td></tr>\n<tr><td>Azure OpenAI</td><td>4 LLM agents + country extraction</td><td>Azure OpenAI deployment + API credential</td></tr>\n<tr><td>Azure Blob Storage</td><td>250+ country data files (<code>&lt;ISO3&gt;.md</code>)</td><td>Anonymous-read container (or SAS if private)</td></tr>\n<tr><td>HubSpot API</td><td>Deal/contact lookup, note creation</td><td>Private app / OAuth with CRM read + notes write</td></tr>\n<tr><td>Microsoft Outlook</td><td>Email delivery to reps</td><td>Microsoft 365 OAuth connection in n8n</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Import the workflow JSON into n8n (imports inactive).</li>\n<li>Re-link credentials on each node: Azure OpenAI models, HubSpot, Outlook, Avoma HTTP nodes.</li>\n<li>Stage country data files in a blob container named by ISO-3 code.</li>\n<li>Register the n8n webhook URL as the post-call trigger.</li>\n<li>Dry-run with a saved real webhook body, email routed only to yourself.</li>\n<li>Verify context assembly size and agent output specificity, then activate and widen the recipient list.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] n8n cloud workspace \u00b7 Avoma API access \u00b7 Azure OpenAI deployment</li>\n<li>[ ] Azure Blob container with country markdown files</li>\n<li>[ ] HubSpot private-app scopes (deals/contacts read, notes write) \u00b7 Outlook OAuth</li>\n<li>[ ] ~2\u20134 hours to deploy and dry-run</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li><strong>Live in production</strong> \u2014 every call auto-produces 5 deliverables (email, missed questions, competitor intel, LinkedIn draft, HubSpot note) with zero rep action.</li>\n<li>Rebuilt from <strong>21/25 executions failing \u2192 2/2 verified end-to-end passes</strong> (0/25 previously reached the email step).</li>\n<li>Verified on a real three-country South America call: <strong>116K characters</strong> of live country context assembled.</li>\n<li>Extraction tightening: <strong>20 \u2192 6 countries</strong> per call, context <strong>882KB \u2192 295KB</strong> (~74K tokens) \u2014 lower cost, better signal.</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>Azure AI Search vector index died (84% of failures)</strong> and couldn&#x27;t be recreated due to permissions \u2192 removed the RAG layer entirely; replaced with deterministic blob fetch (country code \u2192 exact file). The failure point was deleted, not patched.</li>\n<li><strong>Silent wait-loop dead-ends</strong> \u2192 future-meeting guard, count-zero retry path, 10 \u2192 20 poll budget, explicit End nodes.</li>\n<li><strong>Paired-item lineage break lost the transcript</strong> \u2192 context builder carries base fields forward; all 28 fragile per-item references converted to pairing-immune ones.</li>\n<li><strong>Generic, templated output</strong> \u2192 stripped internal noise from country files and enforced a specificity requirement on all four agents.</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>Event-driven multi-agent pipelines \u00b7 pragmatic RAG-vs-deterministic judgment \u00b7 graceful degradation \u00b7 production debugging from execution forensics.</p>", "type_label": "Automation Workflow", "color": "#8a6d3b", "portfolio_blurb": "Reps left sales calls without consistent follow-up, and country-specific facts \u2014 the core of this company's product \u2014 varied rep to rep. A four-agent pipeline now turns every recorded call into five deliverables automatically, rebuilt from a failing RAG-based design (0/25 passing) to a fully verified deterministic one.", "demonstrates_short": "Event-driven multi-agent pipelines", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "prospect-enrichment-pipeline", "name": "Prospect Enrichment Pipeline", "tagline": "A Python enrichment pipeline that guarantees an outsourced SDR agency never calls the same prospect twice.", "category": "Data Quality", "type": "Python Pipeline", "status": "Live in production", "price": "Free", "tags": ["Python", "Amplemarket", "Clay", "data enrichment", "SDR", "dedup"], "headline_metric": "0% overlap against thousands of already-called contacts; 91% phone coverage", "description_short": "A nine-script Python pipeline that merges prospecting exports, dedupes against every already-called contact, enriches missing emails/phones, and emits tier-ranked weekly send plans.", "description_long": "A global HR-tech (EOR) platform pays an outsourced sales agency for SDR calls \u2014 so every stale or already-called contact in a send list burns real money and brand equity. This nine-script Python pipeline merges multiple prospecting-tool exports into one master workbook, dedupes against every contact the agency has ever called, enriches missing emails and phones via a data-enrichment API, scrapes public job boards for international-hiring intent, buckets contacts by ICP role, and emits dated weekly send plans \u2014 tier-ranked so the best contacts go first.", "integrations": ["Python", "Amplemarket", "Clay", "HubSpot", "Greenhouse", "Lever", "Workable", "Ashby", "SmartRecruiters"], "requirements": ["Data-enrichment API account + key (e.g. Amplemarket)", "Prospecting-tool exports or contact CSVs as source lists", "Historical already-contacted lists from your agency/sequences", "Python 3 with requests + openpyxl"], "setup_time": "~1 hour", "onesheet_html": "<h3>Overview</h3>\n<p>A global HR-tech (EOR) platform pays an outsourced sales agency for SDR calls \u2014 so every stale or already-called contact in a send list burns real money and brand equity. This nine-script Python pipeline merges multiple prospecting-tool exports into one master workbook, dedupes against every contact the agency has ever called, enriches missing emails and phones via a data-enrichment API, scrapes public job boards for international-hiring intent, buckets contacts by ICP role, and emits dated weekly send plans \u2014 tier-ranked so the best contacts go first. Result: hundreds of unique, confirmed-fresh contacts delivered with zero overlap against thousands of already-called records.</p>\n<h3>The Problem</h3>\n<p>Prospect data lived in five separate enrichment-tool exports with overlapping people, missing emails, and no memory of who the agency had already dialed. Re-feeding called contacts wastes paid SDR time; sending recruiters or benefits admins wastes it twice. The pipeline had to make freshness and ICP fit structural, not a manual QA step.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>Build the exclusion memory</strong> \u2014 a script parses historical call lists into an exclusion index: thousands of unique keys across three identities (name+company, email, LinkedIn URL). A triple-key dedupe, meaning a contact is caught even if only one identifier matches.</li>\n<li><strong>Merge &amp; dedupe</strong> the five source lists (intent-based hot leads, director-level contacts, global-mobility contacts, fallback CEOs, CEO contacts) into one combined workbook, preserving every source label on merge instead of overwriting.</li>\n<li><strong>Enrich emails</strong> \u2014 a script fills missing work emails via a data-enrichment API&#x27;s email-finder endpoint (LinkedIn-URL lookup first, name+domain fallback); a follow-up script folds results back in, highlighted for review.</li>\n<li><strong>Find net-new contacts</strong> \u2014 a people-search script searches the enrichment API per company for target titles (Director+, HR, Ops, CEO, CFO, COO, Global Mobility), with per-role, per-company caps to control credit burn, excluding both the workbook and the already-called list.</li>\n<li><strong>Scrape hiring intent</strong> \u2014 a script hits public ATS APIs (the job-board platforms companies actually post openings on) and pulls open international roles, a direct buying signal for an Employer-of-Record provider.</li>\n<li><strong>Bucket &amp; plan</strong> \u2014 contacts are classified into ICP role tabs with a title-based exclusion list (recruiters, benefits admins, EAs never sent), phones deduped by last-10 digits, and rolled into dated weekly send plans: a fixed contact count per week, top tier (email AND phone) first.</li>\n<li><strong>Log every send</strong> \u2014 send briefs and a send log in the repo track exactly what went to the agency and when.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>Python 3 (9 scripts, single orchestrator)</td><td>Merge, dedupe, classify, batch</td><td>Local machine; standard pip packages</td></tr>\n<tr><td>Data-enrichment API (Amplemarket)</td><td>Email finder, phone reveal, people search</td><td>API key</td></tr>\n<tr><td>Prospecting-tool exports (Clay)</td><td>Source exports (5 lists) + re-enrichment loop</td><td>CSV exports; no API needed for intake</td></tr>\n<tr><td>Public ATS APIs (Greenhouse, Lever, Workable, Ashby, SmartRecruiters)</td><td>International job postings as intent signal</td><td>None \u2014 public endpoints</td></tr>\n<tr><td>Spreadsheet workbooks</td><td>Master workbook + dated weekly send plans</td><td>Local files</td></tr>\n<tr><td>CRM (HubSpot)</td><td>Downstream import of the master list</td><td>Import-ready CSVs produced by pipeline</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Clone the project folder; install the two required Python packages.</li>\n<li>Set your enrichment-API key in the two scripts that call it.</li>\n<li>Drop the agency&#x27;s historical called lists in the folder and run the exclusion-builder script.</li>\n<li>Place your source export CSVs; run the orchestrator (whole pipeline or a single phase).</li>\n<li>Review the regenerated workbook and dated weekly send plan; tune the role caps and search dictionaries to your ICP.</li>\n<li>Run locally (the enrichment/ATS endpoints need open egress), or route calls through a workflow-automation webhook.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] Enrichment-API account + API key (email finder, phone reveal, people search)</li>\n<li>[ ] Prospecting-tool exports (or any contact CSVs) as source lists</li>\n<li>[ ] Historical &quot;already contacted&quot; lists from your agency/sequences</li>\n<li>[ ] Python 3 with two standard packages</li>\n<li>[ ] Time to deploy: ~1 hour; full pipeline run resumes mid-phase if interrupted</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li><strong>Hundreds of unique contacts across hundreds of companies</strong> with <strong>confirmed 0% overlap</strong> against thousands of already-called keys.</li>\n<li><strong>~91% mobile-phone coverage</strong>, with a meaningful share carrying 2+ phones.</li>\n<li><strong>~76% work-email coverage</strong>, with automated backfill of the remaining gap.</li>\n<li>Rolling <strong>weekly send plans of a couple hundred contacts</strong>, tier-ranked (top tier = email AND phone goes first); two dozen non-ICP titles auto-excluded.</li>\n<li>Every send logged \u2014 send briefs + send log maintained in the repo on an ongoing basis.</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>Same person in multiple exports under different identifiers</strong> \u2192 single-key dedupe missed them \u2192 triple-key dedupe (name+company, email, LinkedIn) plus phone dedupe by last-10 digits.</li>\n<li><strong>Enrichment credit burn scaling with list size</strong> \u2192 per-role, per-company caps and skip-what-exists logic keep spend predictable.</li>\n<li><strong>Enrichment-API endpoint shapes vary by plan/version</strong> \u2192 scripts try multiple endpoint/payload shapes; first match wins, documented fallback to update.</li>\n<li><strong>Sandboxed environments block vendor egress</strong> \u2192 pipeline runs locally by design; a workflow-automation webhook relay is documented as the sandboxed alternative.</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>Data engineering for GTM \u00b7 API-based enrichment at scale \u00b7 cost-capped pipeline design \u00b7 vendor management through automation.</p>", "type_label": "Data Pipeline", "color": "#4a6b8a", "portfolio_blurb": "An outsourced sales-development team was being fed stale, already-called contacts, burning paid outreach time. A nine-script Python pipeline now merges, dedupes, and enriches prospect lists automatically, delivering confirmed 0% overlap against thousands of already-contacted records and 91% phone coverage.", "demonstrates_short": "API-based enrichment at scale", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "rfp-response-suite", "name": "RFP Response Suite", "tagline": "From days to hours on enterprise questionnaires \u2014 a knowledge base that closes its own gaps.", "category": "RevOps", "type": "AI Agent System", "status": "Phase 1 live", "price": "Free", "tags": ["Claude Skill", "HubSpot", "RFP", "knowledge base", "semantic search"], "headline_metric": "Phase 1 live: atomic KB + auto-created HubSpot tickets for every answer gap", "description_short": "A three-part skill suite: builds an atomic, owner-routed RFP knowledge base, semantically matches new questions with honest confidence tiers, and auto-tickets every gap.", "description_long": "Enterprise RFP responses took days of hunting through old documents, answers were inconsistent between reps, and gaps were invisible until a prospect asked a question nobody could answer. This three-part Claude skill suite parses historical RFPs into atomic, owner-routed Q&A facts, semantically matches new RFP questions with a HIGH/MEDIUM/NO-MATCH confidence rating, and auto-creates a CRM ticket for every gap. Phase 1 (KB + gap tickets) is live; later phases (GRC integration, auto-draft) are specced.", "integrations": ["Claude Skill", "HubSpot", "Excel", "Onspring (planned)"], "requirements": ["Historical RFP documents (.pdf/.docx/.xlsx) and CRM ticket history", "Claude Code or Claude access with the RFP skill suite", "CRM private-app token (tickets read-write)", "Named fact owners across product/HR/finance/mobility/implementation"], "setup_time": "~1-2 days for initial KB build", "onesheet_html": "<h3>Overview</h3>\n<p>Enterprise RFP responses at a global HR-tech (EOR) platform took days of hunting through old documents, answers were inconsistent between reps, and gaps in the knowledge base were invisible until a prospect asked a question nobody could answer. This three-part Claude skill suite fixes all three: an <strong>RFP KB Builder</strong> parses historical RFP files and support tickets into atomic, owner-routed Q&amp;A facts; an <strong>RFP Answer Retriever</strong> semantically matches new RFP questions against that knowledge base with an honest confidence rating and auto-creates tickets for every gap; and an <strong>RFP Responder agent</strong> ingests a full RFP, categorizes every requirement, and drafts compliant responses. Phase 1 (KB + gap tickets) is live; Phases 2\u20133 (compliance-platform integration, auto-draft) are specced and ready to build.</p>\n<h3>The Problem</h3>\n<p>RFP responses took days of manual document archaeology, answers drifted between reps answering the same question differently over time, and there was no visibility into which facts the company simply didn&#x27;t have a good answer for \u2014 gaps surfaced only when a prospect&#x27;s question stumped someone.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>RFP KB Builder \u2014 turn history into atomic facts.</strong> Parses historical RFP files (.pdf/.docx/.xlsx) and CRM support tickets into individual, atomic Q&amp;A pairs \u2014 one fact, one answer, not a wall of text.</li>\n<li><strong>Classification</strong> \u2014 each fact is tagged company-wide-general or country/region-specific, the single biggest source of wrong-answer risk in international-employment RFPs.</li>\n<li><strong>Ownership routing</strong> \u2014 every fact is routed to a named owner category (product, HR services, finance, global mobility, implementation) so a stale or disputed answer has a clear person to check with.</li>\n<li><strong>Conflict flagging</strong> \u2014 where historical answers to the same question disagree, the builder flags the conflict instead of silently picking one, so a human resolves it once instead of the same conflict re-emerging in every future RFP.</li>\n<li><strong>Export</strong> \u2014 the resulting knowledge base ships as a compliance-platform-ready two-tab Excel workbook, matching the format the target GRC/knowledge system expects.</li>\n<li><strong>RFP Answer Retriever \u2014 close the loop on new RFPs.</strong> Given a new RFP&#x27;s questions, it semantically matches each one against the KB and returns a <strong>HIGH / MEDIUM / NO-MATCH</strong> confidence rating per answer \u2014 never a false-confident guess.</li>\n<li><strong>Batch processing + gap tickets</strong> \u2014 a full RFP runs as a batch with a coverage summary (% HIGH / MEDIUM / NO-MATCH), and every NO-MATCH question <strong>automatically creates a CRM ticket</strong>, turning &quot;we don&#x27;t know&quot; into an owned, tracked work item instead of a silent gap.</li>\n<li><strong>RFP Responder agent</strong> \u2014 for the full end-to-end case, ingests an entire RFP document, extracts and categorizes every requirement across 8 categories, matches each to the company&#x27;s actual capabilities, drafts a compliant response, and explicitly flags what needs human subject-matter review rather than guessing.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>Claude skills + agent</td><td>KB building, retrieval, drafting</td><td>Claude Code / Claude with skills installed</td></tr>\n<tr><td>Document parsing (PDF/DOCX/XLSX)</td><td>Ingests historical RFPs and source documents</td><td>Local file access</td></tr>\n<tr><td>Semantic matching engine</td><td>Confidence-tiered retrieval against the KB</td><td>Ships with the Answer Retriever skill</td></tr>\n<tr><td>CRM tickets API (HubSpot)</td><td>Auto-creates a ticket for every knowledge gap</td><td>Private-app token (tickets read-write)</td></tr>\n<tr><td>Excel export</td><td>Two-tab, compliance-platform-ready KB workbook</td><td>Local file output</td></tr>\n<tr><td>GRC platform (Onspring, later phase)</td><td>Target destination for a live-synced KB</td><td>Planned integration</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Gather historical RFP files and export relevant support tickets as source material.</li>\n<li>Run the RFP KB Builder skill to generate the atomic Q&amp;A knowledge base; review and resolve any flagged conflicts.</li>\n<li>Assign real owners (product/HR services/finance/global mobility/implementation) to the fact categories in your org.</li>\n<li>Export the two-tab Excel workbook; this is your live KB for Phase 1.</li>\n<li>Run the RFP Answer Retriever skill against a new RFP; review the coverage summary and confirm gap tickets land correctly in the CRM.</li>\n<li>(Later phases, when ready) Wire the KB to your GRC platform and enable the full RFP Responder agent for auto-drafted responses.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] Historical RFP documents (.pdf/.docx/.xlsx) and relevant CRM ticket history</li>\n<li>[ ] Claude Code or Claude access with the RFP skill suite installed</li>\n<li>[ ] CRM private-app token (tickets read-write) for auto-gap-ticketing</li>\n<li>[ ] Named fact owners across product/HR services/finance/global mobility/implementation</li>\n<li>[ ] ~1\u20132 days for initial KB build; hours per RFP thereafter</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li><strong>Phase 1 live</strong>: Excel-as-active-KB plus automatic CRM ticket creation for every answer gap.</li>\n<li><strong>Later phases specced</strong>: GRC platform integration, confidence-scoring v2, and full auto-draft generation.</li>\n<li>Every gap becomes an owned, tracked ticket instead of disappearing until the next RFP hits the same wall.</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>Answers drifting between reps over time</strong> \u2192 atomic Q&amp;A facts with named owners instead of free-text institutional memory.</li>\n<li><strong>Region-specific facts misapplied company-wide (or vice versa)</strong> \u2192 explicit general vs. region-specific classification on every fact.</li>\n<li><strong>Historical answers contradicting each other</strong> \u2192 conflicts flagged for human resolution instead of silently auto-resolved.</li>\n<li><strong>Knowledge gaps invisible until a prospect asked</strong> \u2192 NO-MATCH questions auto-create a CRM ticket, closing the loop from &quot;unknown&quot; to &quot;assigned.&quot;</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>Knowledge-base architecture (atomic facts, ownership routing, conflict detection) \u00b7 honest-confidence retrieval design (HIGH/MEDIUM/NO-MATCH, never a bluff) \u00b7 closing the loop from &quot;unknown&quot; to &quot;assigned.&quot;</p>", "type_label": "AI Agent System", "color": "#3d6b5c", "portfolio_blurb": "Enterprise RFP responses took days of document archaeology, and knowledge gaps stayed invisible until a prospect's question exposed them. A three-part skill suite now builds an atomic, owner-routed knowledge base and auto-creates a tracked ticket for every unanswered question instead of letting it disappear.", "demonstrates_short": "Knowledge-base architecture", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "clay-credit-governance", "name": "Clay Credit Governance", "tagline": "Cutting enrichment cost ~70% by making overspend structurally impossible.", "category": "RevOps", "type": "Platform", "status": "Shipped", "price": "Free", "tags": ["Clay", "FinOps", "cost control", "enrichment", "HubSpot"], "headline_metric": "~70% cost reduction by design \u2014 Lean 15 / Balanced 21 / Full 50 credits per row", "description_short": "A cloneable Clay enrichment table with a free ICP gate, tiered build profiles, and per-row cost estimates \u2014 turns a runaway credit spend into an enforced, monitored standard.", "description_long": "A credit-governance framework for Clay \u2014 the GTM enrichment platform where every lookup costs credits. After a runaway spend incident (background workflows burned a large credit purchase in roughly a month, at ~50 credits/row), the enrichment layer was audited end to end and rebuilt around one standard, cloneable table: a free ICP gate before any paid column, tiered build profiles (Lean ~15 / Balanced ~21 / Full ~50 credits/row), one capped phone column, skip-logic everywhere, and a per-row cost estimate. Paired with recurring spend reports and an hourly AI-credit watcher, no AI spend runs unmonitored again.", "integrations": ["Clay", "HubSpot"], "requirements": ["Clay workspace with admin access and credit-usage export", "A written ICP definition (employee band, geographies) and account tiers", "Optional: CRM access for the AI-credit watcher"], "setup_time": "~half a day", "onesheet_html": "<h3>Overview</h3>\n<p>A credit-governance framework for Clay \u2014 the GTM enrichment platform where every lookup costs credits. After a runaway spend incident at a global HR-tech (EOR) platform (background workflows burned a large credit purchase in roughly a month, at ~50 credits/row), the enrichment layer was audited end to end and rebuilt around one standard, cloneable table: a free ICP gate before any paid column, tiered build profiles (Lean ~15 / Balanced ~21 / Full ~50 credits/row), one capped phone column, skip-logic everywhere, and a per-row cost estimate. Paired with recurring spend reports to the budget-owning leader and an hourly AI-credit watcher, no AI spend runs unmonitored again.</p>\n<h3>The Problem</h3>\n<p>In a recent quarter, Clay workflows running in the background at a global HR-tech (EOR) platform consumed a large credit purchase in about a month \u2014 with no monitoring, no pre-run cost visibility, and builds averaging ~50 credits/row (stacked phone providers re-buying the same number, multiple contacts per company, AI columns firing on every row). The overspend was owned directly, then turned into the system that makes it structurally impossible.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>Clone the standard table</strong> (a reusable Clay workspace template \u2014 Clay is a spreadsheet-style enrichment tool where each column calls a data provider). Inputs: company name, domain, LinkedIn URL, account tier.</li>\n<li><strong>Free columns run first.</strong> Columns execute left-to-right, cheap-to-expensive. Firmographics (0.5 credits) skip rows where employee count is already known.</li>\n<li><strong>A free ICP-gate formula scores every row</strong> (employee band, target geographies). Rows scoring below threshold never trigger a paid column \u2014 the org never pays to enrich a non-ICP row.</li>\n<li><strong>One decision-maker per company</strong> via people-search (1 credit), replacing the old multiple-contacts-per-company pattern.</li>\n<li><strong>One mobile-phone column, capped at 3 provider attempts</strong>, with runConditions (Clay&#x27;s skip-logic) so a populated phone is never re-bought; company phone and additional phone are separate, deduped columns.</li>\n<li><strong>Expensive AI columns (Claygent hooks, international-hiring research, HTTP intent news) are gated to top-tier accounts only</strong> \u2014 Claygent is Clay&#x27;s built-in AI research agent.</li>\n<li><strong>A free <code>est_credit_cost</code> column sums what actually ran</strong>, and the governance loop closes with recurring spend reports to leadership plus an hourly AI-credit watcher with 4-tier alert thresholds and month-end forecasting.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>Clay</td><td>Enrichment tables, formulas, waterfalls, runConditions, Claygent</td><td>Workspace admin</td></tr>\n<tr><td>Clay credit/usage export</td><td>Spend audit + recurring reporting dataset</td><td>Workspace usage visibility</td></tr>\n<tr><td>CRM (HubSpot)</td><td>AI-credit watcher (hourly, 4-tier alerts, month-end forecast)</td><td>Usage/reporting read access</td></tr>\n<tr><td>Spreadsheet / Markdown reports</td><td>Leadership-facing spend packages</td><td>Local files only</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Clone the standard enrichment table (schema JSON + design doc provided) into your Clay workspace.</li>\n<li>Edit the ICP-gate formula to your ICP: employee band + target-country list.</li>\n<li>Set each list&#x27;s tier column and pick a build profile (Lean / Balanced / Full) against the remaining credit balance \u2014 the design doc includes an allocation rule of thumb.</li>\n<li>Verify runConditions reference your actual CRM field names (existing phone, email).</li>\n<li>Dry-run 25\u201350 rows and sanity-check <code>est_credit_cost</code> before a full run.</li>\n<li>Stand up the recurring spend report and credit-watcher thresholds; ban live work from &quot;Copy of&quot; tables (use campaign-named canonical tables).</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] Clay workspace with admin access and credit-usage export</li>\n<li>[ ] A written ICP definition (employee band, geographies) and account-tier assignments</li>\n<li>[ ] Optional: CRM access for the AI-credit watcher</li>\n<li>[ ] Roughly half a day to clone, adapt, and dry-run</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li>Predictable spend profiles: <strong>Lean ~15 \u00b7 Balanced ~21 \u00b7 Full ~50 credits/row</strong> vs. an audited average of ~50 across all builds \u2014 up to ~70% cost reduction by design.</li>\n<li>Free ICP gate: zero paid enrichment on non-ICP rows.</li>\n<li>Post-review audit: over 90% of a full-month credit spend traced to deliberate, requested project runs \u2014 runaway spend eliminated; the remaining governance gap (&quot;Copy of&quot; tables, roughly a fifth of spend) converted into an enforced rule.</li>\n<li>Recurring leadership-level spend reporting + hourly AI-credit watcher: no company AI spend runs unmonitored.</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>Same phone number bought 2\u20133 times</strong> \u2192 stacked phone waterfalls re-purchasing what people-search already returned \u2192 three distinct phone columns with dedupe runConditions; mobile capped at 3 provider attempts.</li>\n<li><strong>AI columns firing on every row</strong> \u2192 no gating \u2192 Claygent/HTTP columns restricted to top-tier accounts by runCondition.</li>\n<li><strong>Nobody saw spend until credits were gone</strong> \u2192 no pre-run visibility \u2192 free <code>est_credit_cost</code> column, recurring leadership report, hourly credit watcher with forecasting.</li>\n<li><strong>&quot;Copy of&quot; tables kept burning credits</strong> \u2192 cloned tables left live \u2192 canonical campaign-named tables + row cap on unapproved manual runs.</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>FinOps thinking applied to AI/data tooling \u00b7 turning an owned failure into an enforced standard \u00b7 cost control by architecture, not vigilance \u00b7 leadership-facing reporting.</p>", "type_label": "Platform", "color": "#3d6b5c", "portfolio_blurb": "A runaway enrichment-spend incident burned through a large credit purchase in about a month with zero pre-run cost visibility. Owning the failure directly led to a rebuilt, tiered enrichment standard with a free eligibility gate and per-row cost estimates \u2014 cutting spend per record by roughly 70% by design.", "demonstrates_short": "FinOps for AI/data tooling", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "clay-prospecting-engine", "name": "Clay Prospecting Engine", "tagline": "Zero-UI prospecting for non-technical reps \u2014 upload a CSV, get an enriched list back.", "category": "Sales Automation", "type": "Claude Skill", "status": "Shipped", "price": "Free", "tags": ["Claude Skill", "Clay", "HubSpot", "enrichment", "prospecting"], "headline_metric": "Two-mode prospecting, zero Clay UI interaction required from reps", "description_short": "Reps upload any CSV; the skill auto-detects company vs. contact data, routes to the right Clay enrichment pipeline, and delivers results to the CRM, chat, or email.", "description_long": "Clay is a powerful GTM enrichment platform, but reps at a global HR-tech (EOR) platform couldn't (and shouldn't have to) drive its UI \u2014 every list request bottlenecked on one person. This production Claude skill lets a rep upload any CSV; it auto-detects whether it's a company list or a contact list, routes to the right Clay pipeline via the Clay REST API, and returns enriched results \u2014 synced to a CRM table, dropped as a CSV in chat, or emailed.", "integrations": ["Claude Skill", "Clay", "HubSpot"], "requirements": ["Clay workspace with target pipelines built and an API key", "Claude Code or Claude access for the team", "Optional: CRM private-app token for direct table sync", "A defined suppression policy (DNC, customers, active sequences, etc.)"], "setup_time": "~1 day", "onesheet_html": "<h3>Overview</h3>\n<p>Clay is a powerful GTM enrichment platform, but reps at a global HR-tech (EOR) platform couldn&#x27;t (and shouldn&#x27;t have to) drive its UI \u2014 every list request bottlenecked on one person. This production Claude skill lets a rep upload any CSV; it auto-detects whether it&#x27;s a company list or a contact list, routes to the right Clay pipeline via the Clay REST API, and returns enriched results \u2014 synced to a CRM table, dropped as a CSV in chat, or emailed. Two-mode prospecting (Company \u2192 find &amp; enrich contacts; Contacts \u2192 fill missing emails/phones/LinkedIn/firmographics) with zero Clay UI interaction required. Backed by a full AI Revenue Operations agent charter governing source-of-truth boundaries, an 18-code suppression taxonomy, and a safe CRM-update policy.</p>\n<h3>The Problem</h3>\n<p>Clay is genuinely powerful for enrichment, but its table-building UI isn&#x27;t something 50+ non-technical reps can (or should) drive themselves. Every list request \u2014 &quot;enrich this list of companies,&quot; &quot;fill in missing emails for these contacts&quot; \u2014 routed through one person, creating a queue and a single point of failure.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>Upload any CSV</strong> \u2014 a rep drops a spreadsheet into the Claude skill; no Clay account or login needed on the rep&#x27;s side.</li>\n<li><strong>Header-signature mode detection</strong> \u2014 the skill inspects the column headers to auto-detect whether the upload is company-level or contact-level data, and picks the matching Clay pipeline without the rep specifying anything.</li>\n<li><strong>Company mode</strong> \u2014 for a company list, the skill routes to a Clay table via the <strong>Clay REST API</strong> (Clay&#x27;s programmatic interface, letting other tools trigger its enrichment without opening Clay itself) that finds and enriches decision-maker contacts at each company.</li>\n<li><strong>Contact mode</strong> \u2014 for a contact list, a different Clay pipeline fills missing emails, phones, LinkedIn URLs, and firmographic data on existing records.</li>\n<li><strong>Staged execution protocol</strong> \u2014 the skill runs in defined stages (validate \u2192 submit to Clay \u2192 poll for completion \u2192 format results) rather than a single black-box call, so failures are catchable and reportable mid-run.</li>\n<li><strong>Delivery choice</strong> \u2014 results return as a <strong>CRM table sync</strong> (writes directly into HubSpot), a CSV attached in the chat, or an emailed file \u2014 whichever fits the rep&#x27;s workflow.</li>\n<li><strong>Governance underneath</strong> \u2014 every run operates inside an AI Revenue Operations charter: the CRM is the source of truth, Clay is enrichment-only, a workflow-automation layer handles orchestration, and a backfill data vendor covers gaps; an 18-code suppression taxonomy (customers, open deals, active sequences, bounces, DNC, etc.) prevents prospecting into people who shouldn&#x27;t be prospected; CRM writes fill blanks but never blind-overwrite existing data, flagging conflicts instead.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>Claude skill</td><td>CSV ingestion, mode detection, staged execution, delivery</td><td>Claude Code / Claude with skill installed</td></tr>\n<tr><td>Clay REST API</td><td>Programmatic trigger of company/contact enrichment pipelines</td><td>Clay API key + pre-built table IDs</td></tr>\n<tr><td>CRM (HubSpot)</td><td>System of truth; optional direct table sync destination</td><td>Private-app token (contacts/companies read-write)</td></tr>\n<tr><td>CSV parsing/validation</td><td>Header-signature detection, input validation</td><td>Ships with the skill</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Build (or reuse) the two Clay pipelines the skill routes to: one for company\u2192contact enrichment, one for contact backfill.</li>\n<li>Install the Claude skill; configure the Clay API key and the two table IDs it targets.</li>\n<li>Configure the CRM private-app token if direct table sync is wanted; otherwise chat/email delivery works standalone.</li>\n<li>Test with a small sample company list and a small sample contact list to confirm mode auto-detection picks correctly.</li>\n<li>Set suppression rules (18-code taxonomy) matching your CRM&#x27;s own do-not-contact / customer / active-sequence fields.</li>\n<li>Roll out to the rep team with a short usage guide; monitor the first week&#x27;s runs against the governance charter.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] Clay workspace with the two target pipelines built and an API key</li>\n<li>[ ] Claude Code or Claude access for the team</li>\n<li>[ ] Optional: CRM private-app token for direct table sync</li>\n<li>[ ] A defined suppression policy (customers, open deals, DNC, bounces, active sequences, etc.)</li>\n<li>[ ] ~1 day to configure pipelines + test both modes</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li><strong>Shipped</strong> with a rep-facing guide.</li>\n<li>Two-mode prospecting (Company and Contacts) with <strong>zero Clay UI interaction</strong> required from reps.</li>\n<li>Backed by a full agent charter: source-of-truth boundaries per system, safe CRM-update policy (fill blanks, never blind-overwrite, flag conflicts), audit trail per run, and a secrets policy that forbids pasted credentials.</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>Every enrichment request bottlenecked on one person</strong> \u2192 self-serve skill with auto-detected mode, removing the manual triage step entirely.</li>\n<li><strong>Risk of reps overwriting good CRM data with enrichment results</strong> \u2192 safe-update policy: fill blanks only, never blind-overwrite, flag conflicts for review instead of silently resolving them.</li>\n<li><strong>Risk of re-prospecting suppressed contacts (customers, DNC, active sequences)</strong> \u2192 an 18-code suppression taxonomy enforced before any list goes out.</li>\n<li><strong>Credential handling by non-technical users</strong> \u2192 a secrets policy that forbids pasting credentials into chat; the skill holds the Clay API key, not the rep.</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>Productizing internal tooling for non-technical users \u00b7 compliance-first outbound design \u00b7 agent governance documents that read like platform policy, not a README.</p>", "type_label": "Claude Skill", "color": "#8a6d3b", "portfolio_blurb": "A powerful enrichment platform's list-building UI was never something 50+ non-technical reps could safely drive themselves, so every request bottlenecked on one person. A CSV-upload skill now auto-detects company vs. contact lists and routes to the right enrichment pipeline with zero UI interaction required.", "demonstrates_short": "Productizing internal tooling", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "entity-readiness-change-report", "name": "Entity Readiness Change Report", "tagline": "A failure-safe weekly diff engine that catches every country compliance flip a marketing team would otherwise miss.", "category": "Compliance", "type": "n8n Workflow", "status": "Build-ready", "price": "Free", "tags": ["n8n", "Onspring", "compliance", "state management", "Outlook"], "headline_metric": "6/6 unit checks passing; baseline writes sit downstream of delivery so failures can never corrupt state", "description_short": "A weekly n8n workflow that diffs country hire-eligibility status against last week's baseline and reports only what flipped \u2014 designed so a failed pull can never produce a false signal.", "description_long": "A global HR-tech (EOR) platform's legal ability to hire in each country changes over time, tracked in a GRC system \u2014 but nobody was catching the flips, so the marketing team kept paying for search ads in countries the company could no longer legally hire in. This weekly n8n workflow pulls country hire-readiness, normalizes it to a strict boolean, diffs against last week's saved baseline, and emails leadership only the countries that flipped \u2014 a locked two-column report.", "integrations": ["n8n", "Onspring", "Outlook", "OneDrive/SharePoint"], "requirements": ["Compliance/GRC system access (e.g. Onspring, read scope)", "n8n workspace with Data Table feature", "Microsoft 365 / Outlook OAuth connection", "Stakeholder sign-off on status definitions and recipient list"], "setup_time": "~1 day (incl. sign-off)", "onesheet_html": "<h3>Overview</h3>\n<p>A global HR-tech (EOR) platform&#x27;s legal ability to hire in each country changes over time, tracked in a GRC/compliance system of record \u2014 but nobody was catching the flips, so the marketing team kept paying for search ads in countries the company could no longer legally hire in. This weekly n8n workflow pulls country hire-readiness from the compliance system, normalizes it to a strict boolean (only two exact statuses count as &quot;ready&quot;), diffs against last week&#x27;s saved baseline, and emails leadership (and, in a later phase, the ad agency) only the countries that flipped \u2014 a locked two-column report. Build-ready with a full passing unit-test suite and a reliability design that treats &quot;silent failure&quot; as the primary threat to guard against.</p>\n<h3>The Problem</h3>\n<p>A global HR-tech (EOR) platform&#x27;s legal ability to hire in a given country is not static \u2014 it changes as entity registrations, licenses, and local regulations shift, and a GRC system tracks this. But nothing surfaced <em>changes</em> to the business side: the marketing team kept running paid search campaigns in countries the company could no longer hire in, wasting spend and creating a compliance risk nobody caught until someone asked.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>Weekly schedule trigger</strong> \u2014 n8n (a workflow-automation platform) fires the pipeline on a fixed weekly cadence, no manual kickoff needed.</li>\n<li><strong>Pull from the compliance system</strong> \u2014 the workflow queries the company&#x27;s governance/risk/compliance platform for the current hire-readiness status of every tracked country.</li>\n<li><strong>Strict normalization</strong> \u2014 country status is reduced to a boolean: only two exact status strings count as &quot;ready to hire&quot;; everything else (including unrecognized or blank values) is treated as not-ready, so ambiguous data never silently reads as a green light.</li>\n<li><strong>State comparison via n8n Data Table</strong> \u2014 the current week&#x27;s normalized snapshot is diffed against last week&#x27;s saved baseline (n8n&#x27;s built-in Data Table acts as the source-of-truth state store, not a database dependency).</li>\n<li><strong>Only flips are reported</strong> \u2014 the output is a locked two-column report (country, direction of flip) containing <em>only</em> countries that changed status this week \u2014 up-flips (regained hire eligibility) and down-flips (lost it).</li>\n<li><strong>Delivery + downstream mirror</strong> \u2014 the report emails to leadership; a locked spreadsheet mirror on cloud storage satisfies a hard infrastructure constraint set by leadership. A later phase extends delivery to the paid-ads agency directly.</li>\n<li><strong>Baseline write happens last, downstream of delivery</strong> \u2014 so a failed pull or failed send can never overwrite last week&#x27;s known-good state.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>n8n</td><td>Schedule trigger, Data Table (state store), Code nodes (normalization + diff logic)</td><td>n8n workspace</td></tr>\n<tr><td>Compliance/GRC system (Onspring)</td><td>Source of country hire-readiness data</td><td>API/read access to the relevant compliance app</td></tr>\n<tr><td>Email (Outlook)</td><td>Weekly report delivery to leadership</td><td>Microsoft 365 OAuth (mail send)</td></tr>\n<tr><td>Spreadsheet on cloud storage</td><td>Mirror of report state, honoring an infrastructure constraint</td><td>Cloud file access</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Confirm the two exact status strings in your compliance system that mean &quot;ready to hire&quot;; hard-code the strict boolean rule.</li>\n<li>Import the n8n workflow JSON; configure the compliance-system pull (API or export-based) and email credential.</li>\n<li>Create the n8n Data Table for baseline state; seed it silently on first run so week one doesn&#x27;t false-alarm on every country.</li>\n<li>Run the unit checks (up-flip, down-flip, first-run seeding, empty-pull abort, missing-country handling, type coercion) before any live send.</li>\n<li>Get stakeholder sign-off on the report format and recipient list before activation.</li>\n<li>Activate the weekly schedule; monitor the first few runs for empty-pull aborts (which should throw loudly, not skip silently).</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] Compliance/GRC system access (read scope on the relevant app)</li>\n<li>[ ] n8n workspace with Data Table feature available</li>\n<li>[ ] Microsoft 365 / Outlook OAuth connection</li>\n<li>[ ] Stakeholder sign-off on the two &quot;ready&quot; status strings and the recipient list</li>\n<li>[ ] ~1 day to configure, test, and get sign-off</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li><strong>Build-ready</strong>, gated on stakeholder sign-off by design (leadership review required before activation).</li>\n<li><strong>Full unit-test suite passes</strong>, covering up-flips, down-flips, first-run seeding, empty-pull aborts, and type coercion.</li>\n<li>Designed so a data-source failure degrades to &quot;no report sent&quot; rather than a false compliance signal in either direction.</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>Nobody caught status flips manually</strong> \u2192 automated weekly diff instead of relying on someone remembering to check the compliance system.</li>\n<li><strong>Risk of a failed pull corrupting the baseline</strong> \u2192 baseline write sits strictly downstream of successful delivery, so a bad run can never overwrite last week&#x27;s good state.</li>\n<li><strong>New countries appearing in the compliance system</strong> \u2192 seed silently into the baseline on first sight instead of firing a false &quot;status changed&quot; alarm.</li>\n<li><strong>Countries disappearing from a data pull</strong> \u2192 treated as a data gap, not as &quot;no longer able to hire&quot; \u2014 the workflow won&#x27;t fire a false down-flip on missing data.</li>\n<li><strong>Ambiguous or new status strings</strong> \u2192 strict allow-list of exactly two &quot;ready&quot; strings; anything else defaults to not-ready rather than guessing.</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>State management and idempotency in workflow systems \u00b7 stakeholder-constraint engineering (an infrastructure mandate honored, not argued with) \u00b7 designing for the failure modes first, not the happy path.</p>", "type_label": "Automation Workflow", "color": "#8b4a3f", "portfolio_blurb": "A company's legal ability to hire in a given country changes over time, but nobody was catching the flips \u2014 marketing kept paying for ads in countries that were no longer eligible. A failure-safe weekly diff engine now reports only what changed, designed so a bad data pull can never corrupt the system's memory.", "demonstrates_short": "State management & idempotency", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "pre-call-briefing-automation", "name": "Pre-Call Briefing Automation", "tagline": "An AI briefing in the rep's inbox before every sales meeting \u2014 so no one walks in cold.", "category": "Sales Automation", "type": "n8n Workflow", "status": "Shipped", "price": "Free", "tags": ["n8n", "HubSpot", "Azure OpenAI", "Factors.ai", "Outlook", "sales enablement"], "headline_metric": "Context-rich AI brief in the rep's inbox before every scheduled meeting, with built-in dedupe", "description_short": "Assembles contact, deal, and buyer-intent context ahead of every sales meeting and emails the rep a structured AI-drafted brief \u2014 the companion to Post-Sales Call Automation.", "description_long": "The companion to Post-Sales Call Automation \u2014 together they bracket every sales call with AI. This n8n workflow watches for upcoming sales meetings, assembles everything the rep should know \u2014 contact, company, deal, and buyer-intent signals from the CRM \u2014 and has an enterprise LLM draft a structured pre-call brief. The brief lands in the rep's inbox before the meeting and is logged to the CRM as a note and a contact property, with dedupe logic so no meeting is briefed twice.", "integrations": ["n8n", "HubSpot", "Azure OpenAI", "Factors.ai", "Outlook"], "requirements": ["n8n workspace", "CRM private-app scopes (contacts, meetings, companies, deals, owners read; notes/properties write)", "Enterprise LLM deployment", "Buyer-intent platform account with API access", "Email OAuth connection"], "setup_time": "~2-3 hours", "onesheet_html": "<h3>Overview</h3>\n<p>The companion to Post-Sales Call Automation \u2014 together they bracket every sales call with AI. This n8n workflow watches for upcoming sales meetings, assembles everything the rep should know \u2014 contact, company, deal, and buyer-intent signals from the CRM \u2014 and has an enterprise LLM draft a structured pre-call brief. The brief lands in the rep&#x27;s inbox before the meeting and is logged to the CRM as a note and a contact property, with dedupe logic so no meeting is briefed twice. Ships with an exec-readable one-pager, a slide deck brief, and an architecture diagram \u2014 every stakeholder sees the same picture.</p>\n<h3>The Problem</h3>\n<p>Reps at a global HR-tech (EOR) platform walked into discovery calls cold. Context existed \u2014 deal records, contact history, intent data \u2014 but it was scattered across CRM objects and third-party tools, and nobody had time to assemble it before every meeting.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>Webhook trigger + payload normalization</strong> \u2014 a webhook fires into n8n (a workflow-automation platform) with a contact or meeting event; a Code node normalizes the payload so downstream steps see one consistent shape.</li>\n<li><strong>Contact and meeting resolution (CRM API)</strong> \u2014 the workflow resolves the contact (adopting the meeting&#x27;s contact if no ID arrived), extracts associations, and batch-reads associated meetings to pick the next upcoming one. The CRM is the system of record for contacts, companies, and deals.</li>\n<li><strong>Dedupe guard</strong> \u2014 an &quot;existing brief&quot; check verifies the meeting hasn&#x27;t already been processed, so reps never get duplicate briefings.</li>\n<li><strong>Context gathering</strong> \u2014 parallel CRM lookups pull the company, the deal, and the rep (owner), plus a <strong>buyer-intent platform</strong> \u2014 showing which accounts are actively researching \u2014 all merged into one context object.</li>\n<li><strong>AI brief drafting</strong> \u2014 an LLM agent with a structured output parser (enterprise-hosted model, forced into a predictable JSON shape) drafts the pre-call brief from the assembled context.</li>\n<li><strong>Delivery + CRM logging</strong> \u2014 the brief is formatted into an email and sent to the rep; a CRM note is created and a pre-call-notes contact property is updated so the brief lives on the record too.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>n8n</td><td>Workflow engine (26-node pipeline)</td><td>n8n workspace, webhook enabled</td></tr>\n<tr><td>CRM API (HubSpot)</td><td>Contacts, meetings, companies, deals, owners, notes, properties</td><td>Private app / OAuth with CRM read + notes/properties write</td></tr>\n<tr><td>Buyer-intent platform (Factors.ai)</td><td>Intent signals for the account</td><td>API access (read intent data)</td></tr>\n<tr><td>Enterprise LLM (Azure OpenAI)</td><td>Brief-drafting agent + structured output parser</td><td>Deployment + API credential</td></tr>\n<tr><td>Email (Outlook)</td><td>Briefing email to the rep</td><td>Microsoft 365 OAuth connection in n8n</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Import the pre-call workflow JSON into n8n (imports inactive).</li>\n<li>Re-link credentials: CRM, LLM, email, and the buyer-intent HTTP request.</li>\n<li>Create/confirm the CRM pre-call-notes contact property the workflow writes to.</li>\n<li>Register the webhook URL against the meeting/contact trigger source.</li>\n<li>Dry-run with a test contact that has an upcoming meeting; confirm the dedupe guard passes then blocks a second run.</li>\n<li>Review a sample brief for accuracy, then activate for the team.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] n8n workspace \u00b7 CRM private-app scopes (contacts, meetings, companies, deals, owners read; notes/properties write)</li>\n<li>[ ] Enterprise LLM deployment \u00b7 buyer-intent platform account with API access \u00b7 email OAuth</li>\n<li>[ ] ~2\u20133 hours to deploy and dry-run</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li>Shipped as a complete package: production workflow JSON, slide-deck brief, stakeholder one-pager, and architecture diagram.</li>\n<li>Designed to put a context-rich briefing in front of the rep before every scheduled sales meeting \u2014 automatically, with built-in dedupe.</li>\n<li>Together with Post-Sales Call Automation, brackets the entire sales-call lifecycle with AI (brief before, follow-up after).</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>Inconsistent trigger payloads</strong> \u2192 a normalization Code node up front, plus an adopt-the-meeting-contact fallback when no contact ID arrives.</li>\n<li><strong>Risk of duplicate briefings</strong> \u2192 explicit &quot;existing brief&quot; gate before any AI spend.</li>\n<li><strong>Free-form LLM output</strong> \u2192 structured output parser forces a stable JSON schema before the email formatter runs.</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>End-to-end ownership of the sales-call lifecycle \u00b7 intent-data enrichment in a CRM path \u00b7 stakeholder communication \u2014 every build ships with an exec-readable brief.</p>", "type_label": "Automation Workflow", "color": "#8a6d3b", "portfolio_blurb": "Reps walked into discovery calls cold despite the context already existing somewhere in the CRM. This workflow assembles contact, deal, and buyer-intent data automatically and delivers an AI-drafted brief to the rep's inbox before every meeting, with built-in dedupe so nothing is briefed twice.", "demonstrates_short": "Sales-call lifecycle ownership", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "n8n-execution-intelligence", "name": "n8n Execution Intelligence", "tagline": "Point it at any n8n workflow \u2014 get root cause, fix suggestion, and a live health dashboard in under a minute.", "category": "Observability", "type": "Platform", "status": "Design phase", "price": "Free", "tags": ["n8n", "Python", "SQLite", "observability", "SRE"], "headline_metric": "Target: failure diagnosis from 10-15 min to under 60 seconds", "description_short": "A read-only observability layer for n8n: archives every execution, runs failure/performance/health analysis, and answers plain-English questions grounded in real execution IDs \u2014 no fabrication.", "description_long": "An observability layer for your n8n automation stack. Paste a workflow ID or n8n link and it ingests the entire execution history via the n8n Public API (GET-only by charter), archives every run into a master knowledge file, and runs a three-layer analysis: failures + fixes, performance, and health. Ask 'why did this execution fail?' and get a plain-English root cause with a suggested fix, citing real execution IDs. An auto-updating HTML dashboard gives the whole team at-a-glance automation health.", "integrations": ["n8n", "Python", "SQLite", "Chart.js", "HubSpot (optional)", "Clay (optional)"], "requirements": ["n8n Cloud/self-hosted instance with Public API enabled + read-scope API key", "Python 3 runtime (local or sandboxed)", "Optional: Claude Code/Cowork for the skill front door"], "setup_time": "~1 hour to deploy once built", "onesheet_html": "<h3>Overview</h3>\n<p>An observability layer for your n8n automation stack. Paste a workflow ID or n8n link and NEI ingests the entire execution history via the n8n Public API (GET-only by charter), archives every run \u2014 full raw JSON included \u2014 into a master <code>.md</code> knowledge file, and runs a three-layer analysis: failures + fixes, performance, and health. Ask &quot;why did this execution fail?&quot; and get a plain-English root cause with a suggested fix, citing real execution IDs. An auto-updating HTML dashboard gives the whole team at-a-glance automation health. Target: cut failure diagnosis from 10\u201315 minutes of clicking to under 60 seconds.</p>\n<h3>The Problem</h3>\n<p>At a global HR-tech (EOR) platform (~500 employees, operating in 160+ countries), the prospect pipeline runs on n8n automations chaining intent data \u2192 HubSpot \u2192 n8n \u2192 Clay \u2192 sequencing \u2192 dialer. When a workflow failed or quietly stalled, the team found out only when prospect data stopped moving \u2014 then diagnosed it by clicking through executions in the n8n UI one at a time, 10\u201315 minutes per incident, with no shared view of automation health.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>Front door</strong> \u2014 a Claude skill/agent (or CLI) accepts a workflow ID or an n8n URL and resolves the target on the company&#x27;s n8n Cloud instance.</li>\n<li><strong>Ingest (read-only)</strong> \u2014 a Python client pulls every execution via the n8n Public API v1 with cursor pagination. Plain English: it downloads the workflow&#x27;s full run history without ever being able to change anything.</li>\n<li><strong>Parse + store</strong> \u2014 each execution&#x27;s status, timing, per-node <code>runData</code>, failing node, and error message land in SQLite (Postgres-ready) plus a per-workflow master <code>.md</code> archive with the raw JSON. Idempotent upsert: re-runs update, never duplicate.</li>\n<li><strong>Three-layer analysis</strong> \u2014 (a) failures + fixes with a 9-category error taxonomy (auth, rate_limit, timeout, mapping_error, downstream_http, data_shape, manual_stop, waiting_unresumed, unknown); (b) performance (duration, node timing, p95, success rate); (c) health (stall detection, trends, composite health score).</li>\n<li><strong>Grounded answers</strong> \u2014 natural-language diagnosis where every number traces to a real execution ID. Absent data = null; no fabrication, ever.</li>\n<li><strong>Dashboard + alerts</strong> \u2014 a self-contained HTML/Chart.js dashboard (shareable with the go-to-market team and leadership) refreshes on each run; alerting ships dry-run by default. Optional v1.1: correlate against HubSpot/Clay to confirm records actually landed.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>n8n Public API v1</td><td>Execution/workflow ingestion</td><td>API key in env, GET-only</td></tr>\n<tr><td>Python 3 (requests, pandas, jinja2)</td><td>ETL + analysis pipeline</td><td>Local/sandboxed runtime</td></tr>\n<tr><td>SQLite</td><td>Executions + node_runs store</td><td>Local file, Postgres-ready DAL</td></tr>\n<tr><td>Chart.js / Plotly</td><td>Dashboard rendering</td><td>None (render only)</td></tr>\n<tr><td>Claude skill</td><td>NL front door + orchestration</td><td>Claude Code / Cowork</td></tr>\n<tr><td>HubSpot MCP/REST (v1.1)</td><td>Did-records-land correlation</td><td>Least-privilege read scopes</td></tr>\n<tr><td>Clay API/webhook (v1.1)</td><td>Enrichment-run correlation</td><td>Table read access</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Provision an n8n Public API key on your instance and export it as an environment variable (never committed or logged).</li>\n<li>Install the skill / clone the pipeline; run the API Readiness check (a 401 blocks with a clear message instead of failing silently).</li>\n<li>Pilot on one workflow with <code>--limit</code> to validate the master <code>.md</code> schema and error taxonomy on real data.</li>\n<li>Run full ingestion; verify idempotent upsert by re-running.</li>\n<li>Generate the dashboard; share the HTML artifact or Cowork live artifact.</li>\n<li>Enable the scheduled runner (default daily); leave alerts in dry-run until output is trusted.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] n8n Cloud/self-hosted instance with Public API enabled + API key (read scope)</li>\n<li>[ ] Python 3 runtime (local or sandboxed)</li>\n<li>[ ] Claude Code/Cowork for the skill front door (optional \u2014 CLI works standalone)</li>\n<li>[ ] Optional v1.1: HubSpot read token, Clay table access</li>\n<li>[ ] Time: ~1 hour to deploy once built; full build plan is 16 prioritized tasks, \u224841 hours</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li><strong>Targets (design-phase, honestly scoped):</strong> time-to-diagnosis from 10\u201315 min to <strong>under 60 seconds</strong>; stalled workflows detected <strong>within 24 hours</strong>; <strong>\u226580%</strong> of failures shipped with an actionable fix suggestion.</li>\n<li>Working read-only API client, SQLite store, diagnosis engine, and HTML dashboard already shipped in a prior execution-analysis skill \u2014 this system formalizes and extends it.</li>\n<li>Full leadership-ready package (brief, PRD, architecture, prioritized build plan, build prompts) generated at 92% package quality via the builder&#x27;s own project-intake framework.</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>Silent failure discovery</strong> \u2192 failures surfaced only when data stopped moving \u2192 stall detection with SLA windows and a composite health score, checked on a daily schedule.</li>\n<li><strong>LLM fabrication risk in diagn
