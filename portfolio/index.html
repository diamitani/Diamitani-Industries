<style>
:root {
  --bg: #faf8f4;
  --bg-2: #f1ece2;

  --ink: #1c1b19;

}

  :root {
    --bg: #17161a; --bg-2: #1e1c21; --panel: #221f26; --ink: #f1efe9; --ink-soft: #cdc8bd;
    --muted: #9a9488; --border: #34313a; --navy: #8fa6d9; --navy-soft: #b3c4e6; --gold: #d3a866;
    --success: #7fcfa8; --shadow: 0 14px 32px rgba(0,0,0,.4);
  }
}
:root[data-theme="dark"] {
  --bg: #17161a; --bg-2: #1e1c21; --panel: #221f26; --ink: #f1efe9; --ink-soft: #cdc8bd;
  --muted: #9a9488; --border: #34313a; --navy: #8fa6d9; --navy-soft: #b3c4e6; --gold: #d3a866;
  --success: #7fcfa8; --shadow: 0 14px 32px rgba(0,0,0,.4);
}
:root[data-theme="light"] {
  --bg: #faf8f4; --bg-2: #f1ece2; --panel: #ffffff; --ink: #1c1b19; --ink-soft: #4a4742;
  --muted: #7a766d; --border: #e4ddd0; --navy: #1b2a4a; --navy-soft: #2e4270; --gold: #a9752f;
  --success: #2f6b4f; --shadow: 0 14px 32px rgba(28,27,25,.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--font-body); line-height: 1.65; -webkit-font-smoothing: antialiased; }
#app { max-width: 100%; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
h1, h2, h3, h4 { font-family: var(--font-serif); line-height: 1.15; color: var(--ink); text-wrap: balance; }
button { font-family: var(--font-body); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }

.nav { position: sticky; top: 0; z-index: 200; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 16px 28px; background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.brand { font-family: var(--font-serif); font-weight: 600; font-size: 17px; display: flex; align-items: center; gap: 8px; cursor: pointer; background: none; border: none; color: var(--ink); }
.brand-div { color: var(--gold); }
.brand-sub { font-family: var(--font-body); font-size: 10.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
.nav-links { display: flex; align-items: center; gap: 22px; font-size: 13.5px; color: var(--ink-soft); }
.nav-links button { background: none; border: none; color: inherit; font-size: 13.5px; cursor: pointer; }
.nav-links a:hover, .nav-links button:hover { color: var(--navy); }
.nav-cta { border: 1px solid var(--border); border-radius: 999px; padding: 6px 14px; }
.theme-toggle { border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; background: var(--panel); cursor: pointer; font-size: 13px; color: var(--ink-soft); }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 14.5px; transition: transform .15s ease, box-shadow .15s ease; cursor: pointer; border: none; }
.btn-primary { background: var(--navy); color: var(--bg); box-shadow: 0 6px 18px color-mix(in srgb, var(--navy) 30%, transparent); }
.btn-primary:hover { transform: translateY(-2px); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--ink-soft); }
.btn-ghost:hover { color: var(--navy); border-color: var(--navy); }
.btn:focus-visible, button:focus-visible, a:focus-visible, input:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; }

.view { animation: fade-in .35s ease; }
@keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.hero { padding: 96px 28px 60px; text-align: center; background: linear-gradient(180deg, var(--bg-2), var(--bg)); border-bottom: 1px solid var(--border); }
.hero-inner { max-width: 780px; margin: 0 auto; }
.hero-eyebrow { font-size: 12px; color: var(--gold); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 18px; font-weight: 600; }

.hero-stats { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; margin: 38px 0 30px; }
.stat { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 26px; min-width: 130px; }

.hero-cta-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

.about-section, .approach-section { padding: 68px 28px; border-bottom: 1px solid var(--border); }
.about-inner { max-width: 840px; margin: 0 auto; }
.about-section h2, .approach-section h2, .contact-section h2 { font-size: 30px; margin-bottom: 24px; }

.highlights-list li { position: relative; padding-left: 22px; color: var(--ink-soft); font-size: 14.5px; }
.highlights-list li::before { content: "—"; position: absolute; left: 0; color: var(--gold); font-weight: 700; }

.approach-section { background: var(--bg-2); }
.approach-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 16px; }
.approach-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }

.library { max-width: 1180px; margin: 0 auto; padding: 68px 28px; }
.library-head { display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }

#search { background: var(--panel); border: 1px solid var(--border); color: var(--ink); border-radius: 8px; padding: 10px 15px; width: min(300px, 100%); font-size: 13.5px; font-family: var(--font-body); }
#search:focus { outline: none; border-color: var(--navy); }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 26px; }
.filter-btn { background: var(--panel); border: 1px solid var(--border); color: var(--muted); border-radius: 999px; padding: 7px 15px; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all .15s; }
.filter-btn:hover { color: var(--navy); }
.filter-btn.active { background: var(--navy); color: var(--bg); border-color: var(--navy); }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.card { display: flex; flex-direction: column; gap: 11px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; transition: transform .18s ease, box-shadow .18s; position: relative; text-align: left; cursor: pointer; }
.card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 3px; border-radius: var(--radius) var(--radius) 0 0; background: var(--cat-color, var(--navy)); }
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
.card-top { display: flex; justify-content: space-between; align-items: center; }

.card-cta { color: var(--navy); font-weight: 600; white-space: nowrap; }

.badge { font-size: 10.5px; font-weight: 600; padding: 4px 10px; border-radius: 999px; letter-spacing: .02em; }

.status-badge { background: color-mix(in srgb, var(--success) 12%, transparent); color: var(--success); border: 1px solid color-mix(in srgb, var(--success) 35%, transparent); }
.tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 10.5px; color: var(--muted); background: var(--bg-2); border: 1px solid var(--border); padding: 3px 9px; border-radius: 6px; }

.product-hero { margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }

.product-hero h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 600; letter-spacing: -.01em; }
.tagline { color: var(--ink-soft); font-size: 16px; margin: 13px 0 16px; max-width: 68ch; }
.metric-callout { display: inline-block; font-weight: 600; color: var(--success); background: color-mix(in srgb, var(--success) 10%, transparent); border: 1px solid color-mix(in srgb, var(--success) 30%, transparent); border-radius: 8px; padding: 9px 15px; margin-bottom: 16px; font-size: 14px; }
.product-body { display: grid; grid-template-columns: 1fr 280px; gap: 28px; align-items: start; }
.side-panel { display: flex; flex-direction: column; gap: 14px; }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 11px; font-family: var(--font-body); font-weight: 700; }
.panel-cta p { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 13px; }
.panel-cta .btn { width: 100%; }
.req-list { list-style: none; display: flex; flex-direction: column; gap: 7px; font-size: 13px; color: var(--ink-soft); }
.req-list li::before { content: "✓ "; color: var(--success); font-weight: 700; }

.onesheet { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px 34px; }
.onesheet h2 { font-size: 19px; margin: 26px 0 11px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.onesheet h2:first-child { margin-top: 0; }
.onesheet h3 { font-size: 16px; margin: 20px 0 9px; font-family: var(--font-body); font-weight: 700; }
.onesheet p { color: var(--ink-soft); font-size: 14.5px; margin-bottom: 11px; }
.onesheet ul, .onesheet ol { margin: 0 0 13px 21px; color: var(--ink-soft); font-size: 14.5px; display: flex; flex-direction: column; gap: 6px; }
.onesheet strong { color: var(--ink); }
.onesheet code { font-family: var(--font-mono); font-size: 12px; background: var(--bg-2); border: 1px solid var(--border); padding: 2px 6px; border-radius: 5px; color: var(--navy); }
.onesheet hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
.table-wrap { overflow-x: auto; margin: 13px 0 18px; border: 1px solid var(--border); border-radius: 8px; }
.onesheet table { width: 100%; border-collapse: collapse; font-size: 13px; }
.onesheet th { text-align: left; background: var(--bg-2); color: var(--muted); font-weight: 700; padding: 9px 13px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.onesheet td { padding: 9px 13px; border-bottom: 1px solid var(--border); color: var(--ink-soft); vertical-align: top; }
.onesheet tr:last-child td { border-bottom: none; }

.footer { border-top: 1px solid var(--border); padding: 26px 28px; background: var(--bg-2); }
.footer-inner { max-width: 1180px; margin: 0 auto; display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }

@media (max-width: 860px) {

}
</style>

<script>
const SITE = {"hero": "GTM AI & Automation Manager building production AI systems that 50+ non-technical revenue teammates use every day \u2014 including a customer-facing AI agent that has already sourced a quarter-million-dollar deal and $520K+ in attributed pipeline.", "aboutHtml": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>", "highlights": ["Built and shipped a full-stack AI customer agent \u2014 chat interface, qualification pipeline, reporting warehouse, and revenue-attribution layer \u2014 that sourced a $250K deal traceable to a single conversation and $520K+ in attributed pipeline within its first four months live.", "Designed and launched an automated compliance-screening system that corrected 100+ misclassified deals stuck in manual review and more than doubled detection of ineligible deals across the full sales pipeline, with a perfect production write record.", "Diagnosed and rebuilt a four-agent, post-sales-call automation pipeline from a failing RAG-based design (a broken vector index causing the majority of failures) to a deterministic architecture \u2014 going from 0 successful end-to-end runs to fully verified in production.", "Owned a runaway AI/data-enrichment spend incident end to end and redesigned the underlying system around a free eligibility gate and tiered cost profiles, cutting spend per record by roughly 70% by architecture, not vigilance.", "Directed a nine-script enrichment pipeline for an outsourced sales-development pipeline, achieving confirmed 0% contact overlap against thousands of already-contacted records and 91% phone coverage.", "Built and published a 40+ skill AI automation library plus a self-serve project-intake engine that cut idea-to-scoped-project time from 4\u20138 hours to under 30 minutes across a 50-person go-to-market org."], "approach": [{"title": "Hybrid AI Architecture", "desc": "Every system in this library draws a hard line between judgment and interpretation. Language models are used for exactly what they're good at \u2014 reading unstructured text, mapping messy values to clean categories, drafting first-pass copy \u2014 while the actual decision (a compliance tier, a lifecycle stamp, a dollar figure) is made by deterministic, testable code that produces the same answer on the same input, every time."}, {"title": "Production Discipline", "desc": "Nothing ships without a dry-run path, a rollback plan, and a way to fail loudly instead of silently. Systems that touch live CRM data default to report-only until a human signs off, and every automation shares a common error-handling pattern so a failure surfaces the same way, every time, instead of becoming a one-off mystery."}, {"title": "Cost Engineering", "desc": "AI and enrichment spend is treated as an engineering constraint, not an afterthought. Free eligibility checks run before any paid step, expensive operations are gated to the accounts that actually warrant them, and every workflow reports its own cost \u2014 so spend stays predictable by design rather than by someone remembering to watch a dashboard."}, {"title": "Platform Building", "desc": "The most durable output isn't any single automation \u2014 it's the standard that makes the next one faster to build safely. A shared build methodology, a self-serve project-intake tool, and a reusable skill library mean the organization's AI capability compounds instead of living entirely inside one person's head."}], "contact": "Reach Patrick at pdiamitani@atlashxm.com or on LinkedIn at linkedin.com/in/diamitani.", "products": [{"slug": "gtm-ai-platform", "name": "The GTM AI Platform", "tagline": "Not one automation \u2014 the operating system a 50-person GTM org runs its AI adoption on.", "category": "Platform", "type": "Platform", "status": "Live in production", "price": "Free", "tags": ["Claude Skills", "n8n", "Ollama", "platform", "governance", "ROSTR"], "headline_metric": "40+ skills live across a 50-person org; idea-to-scoped-project cut from 4-8 hrs to under 30 min", "description_short": "The standards, intake engine, 40+ skill library, and local AI infrastructure that let one person's automation work compound across an entire GTM org.", "description_long": "Any single automation is a win. Fifty-plus reps and marketers using AI daily requires a system \u2014 standards, reusable skills, project governance, and knowledge that survives its author. This is the platform layer every other product in this portfolio runs on: a published build methodology, a project-intake engine that turns any raw idea into a leadership-ready package in under 30 minutes, a 40+ skill library, and a self-hosted local AI infrastructure for zero-API-key development.", "integrations": ["Claude Skills/MCP", "n8n", "Ollama", "HubSpot", "Clay", "Amplemarket", "Avoma", "Asana", "Factors.ai", "Microsoft 365"], "requirements": ["AI coding/skill environment access for the org", "A written intake/PRD convention (e.g. ROSTR or your own equivalent)", "Time to build the first 5-10 skills against the standard", "Executive sponsorship \u2014 a platform investment, not a single automation"], "setup_time": "Ongoing platform build \u2014 weeks to first critical mass", "onesheet_html": "<h3>Overview</h3>\n<p>Any single automation is a win. Fifty-plus reps and marketers using AI daily requires a <em>system</em> \u2014 standards, reusable skills, project governance, and knowledge that survives its author. This is the platform layer every other product in this portfolio runs on: a published <strong>build methodology</strong> (a framework applied to every agent in the org), a <strong>project-intake engine</strong> that turns any raw idea into a leadership-ready package in under 30 minutes, a <strong>40+ skill library</strong> covering brand content, GTM automation, chatbot management, and cross-session memory, and a <strong>self-hosted local AI infrastructure</strong> for zero-API-key development. This is the Director-level story: not automations, but the standards, governance, and observability layer that lets one person&#x27;s work compound across fifty.</p>\n<h3>The Problem</h3>\n<p>One-off automations don&#x27;t scale past their author. Without shared standards, every new skill reinvents its own conventions, every new project idea takes hours of back-and-forth to scope, institutional knowledge lives in one person&#x27;s head, and there&#x27;s no way for a non-technical org of 50+ to safely adopt AI at the pace the business needs.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>A published build methodology.</strong> A framework combining <strong>prompt compilation</strong> (setting technical depth and framing for a given audience), <strong>jobs-to-be-done planning</strong> (what outcome the build actually serves), a <strong>work-classification spine</strong> (navigate/prioritize/allocate/orchestrate \u2014 a repeatable shape for any project), and <strong>provenance honesty</strong> (never presenting an inference as a verified fact). Applied to every agent manifest built across the platform, so a new skill isn&#x27;t a blank page \u2014 it inherits a proven shape.</li>\n<li><strong>A project-intake engine.</strong> Takes any raw idea \u2014 text, files, links, a chat thread \u2014 and turns it into a leadership-ready package: a PRD, an architecture diagram, a build plan, a KPI framework, and a project-management export. Cut idea-to-scoped-project from 4\u20138 hours of manual scoping to <strong>under 30 minutes</strong>, and made every resulting project auditable by anyone, not just its author.</li>\n<li><strong>A 40+ skill library for the GTM team.</strong> A brand suite (on-brand social/email/blog/proposal generation using official fonts, colors, and logos \u2014 so content stays on-brand without a designer in the loop for every post); a proposal &amp; presentation builder (branded slide-deck output); a GTM automation architect skill (enrichment/workflow/CRM automation expert, callable in plain English); a workflow architect &amp; engineer (turns a rough automation idea into a full technical spec); a chatbot manager; a context-engine (persistent memory across AI sessions, so context doesn&#x27;t reset every conversation); the case-study builder that generated this very document; a token-spend analyst; and more \u2014 each a reusable, packaged capability rather than a one-off script.</li>\n<li><strong>Local AI infrastructure.</strong> A self-hosted stack running an AI coding assistant against local open models via a custom translation proxy \u2014 a small Python service that lets the assistant&#x27;s API calls target locally-run models instead of a hosted API. Persisted as background services (surviving reboots without manual restarting) with a model-routing config, enabling zero-API-key development and cost-controlled experimentation before anything touches production credentials.</li>\n<li><strong>Governance that compounds.</strong> Every skill inherits the same production discipline visible across this portfolio: dry-run defaults, audit trails, ownership routing, and provenance honesty \u2014 so the system gets <em>safer</em> as it gets bigger, not riskier.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>Claude / Anthropic ecosystem (skills, MCP servers, agents)</td><td>The runtime every skill and agent in the platform is built on</td><td>Claude Code / Claude access, org-level skill deployment</td></tr>\n<tr><td>Python</td><td>Intake engine logic, local proxy service, analysis pipelines</td><td>Local/sandboxed runtime</td></tr>\n<tr><td>n8n</td><td>Orchestration layer for automation-heavy skills</td><td>n8n workspace</td></tr>\n<tr><td>Background service manager (e.g. launchd)</td><td>Persists local proxy + model-runtime services across reboots</td><td>Local machine admin</td></tr>\n<tr><td>Local model runtime (e.g. Ollama)</td><td>Local model runtime for zero-API-key development</td><td>Local install</td></tr>\n<tr><td>GTM SaaS stack (CRM, enrichment, sequencing, call-intelligence, project management, intent data, productivity suite)</td><td>The systems every downstream skill in the platform integrates with</td><td>Per-tool credentials, scoped per skill</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Stand up an AI coding/skill environment as the org&#x27;s shared skill-execution runtime.</li>\n<li>Publish a build methodology spec as the required shape for any new skill or agent build.</li>\n<li>Deploy a project-intake skill as the front door for any new automation idea \u2014 text, file, or link in, leadership package out.</li>\n<li>Roll out the skill library in phases (brand suite first for immediate content value, then automation-facing skills).</li>\n<li>Stand up a context-engine for persistent cross-session memory once the team is running enough recurring work to benefit from it.</li>\n<li>Optionally stand up local AI infrastructure (local model + translation proxy + background services) for cost-controlled experimentation separate from production API spend.</li>\n<li>Establish a lightweight review cadence so the skill library doesn&#x27;t drift from the standard.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] AI coding/skill environment access for the org (or at minimum, for the platform owner)</li>\n<li>[ ] A written intake/PRD convention the org will actually follow</li>\n<li>[ ] Time to build the first 5\u201310 skills against the standard before the library reaches critical mass</li>\n<li>[ ] Optional: a local machine for the local-model/proxy infrastructure if cost-controlled local development is a priority</li>\n<li>[ ] Executive sponsorship \u2014 this is a Director-level platform investment, not a single automation</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li><strong>40+ skills</strong> shipped and in active use across a 50+-person GTM org.</li>\n<li>Idea-to-scoped-project time cut from <strong>4\u20138 hours to under 30 minutes</strong> via the project-intake engine.</li>\n<li>Every project in the portfolio traces back to the same build methodology \u2014 meaning a new hire (or a hiring committee) can read any one build and understand the standard behind all of them.</li>\n<li>Local AI infrastructure enables zero-API-key experimentation, decoupling exploration cost from production spend.</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>Every new skill reinventing its own conventions</strong> \u2192 a published build spec that every new build inherits from day one.</li>\n<li><strong>New project ideas taking hours of back-and-forth to scope before any work started</strong> \u2192 a self-serve intake engine that turns raw input into a full leadership package in under 30 minutes.</li>\n<li><strong>Institutional knowledge living in one person&#x27;s head</strong> \u2192 a documented skill library plus a persistent context-engine so work compounds instead of resetting.</li>\n<li><strong>AI experimentation cost competing with production budget</strong> \u2192 a local, self-hosted model stack for exploration, fully decoupled from hosted API spend.</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>This is the Director-level story: not automations, but an <strong>operating system for a GTM org&#x27;s AI adoption</strong> \u2014 standards, governance, reusable components, cost control, observability, and a documentation culture, built by one person and used by fifty.</p>", "type_label": "Platform", "color": "#1b2a4a", "portfolio_blurb": "One automation is a win; fifty people using AI daily requires a system. A published build methodology, a self-serve project-intake engine, and a 40+ skill library now let one person's work compound across an entire go-to-market org instead of resetting with every new request.", "demonstrates_short": "Standards, governance, and scale", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "ai-customer-agent-suite", "name": "AI Customer Agent Suite", "tagline": "A production website AI agent, plus the qualification pipeline, reporting warehouse, and revenue-attribution layer that prove exactly what it's worth.", "category": "Sales Automation", "type": "AI Agent System", "status": "Live in production", "price": "Free", "tags": ["HubSpot", "Breeze Customer Agent", "n8n", "Azure OpenAI", "GPT-4o-mini", "Microsoft Graph", "SharePoint", "MQL classification", "revenue attribution", "LangChain"], "headline_metric": "Quarter-million-dollar deal sourced from a single chat \u2014 traced to the exact conversation", "description_short": "End-to-end AI customer agent for a global HR-tech platform: the agent, a governed MQL classification pipeline, a reporting warehouse, and three-tier deal attribution \u2014 over $500K sourced deal value in four months.", "description_long": "A production AI customer agent for a global HR-tech (EOR) platform (~500 employees, hiring in 160+ countries) \u2014 built end to end by one person: the agent itself (versioned conversation guidelines, guardrails, knowledge base, routing), a live AI qualification pipeline that classifies every closed chat as MQL or Not under strict governance rules, a three-workflow reporting warehouse, and a three-tier deal-attribution layer. Live on the pricing page since launch. Headline result: a visitor chatted one day, the pipeline stamped an MQL, and a rep opened a quarter-million-dollar deal the next day \u2014 traceable to the exact conversation. Over $500K in agent-sourced deal value in the first four months.", "integrations": ["HubSpot Customer Agent (Breeze)", "HubSpot Conversations API", "HubSpot CRM v3/v4 APIs", "n8n cloud", "Azure OpenAI", "Microsoft Graph (SharePoint Excel + Outlook)", "Python dashboard"], "requirements": ["HubSpot portal with Customer Agent (Breeze) enabled", "HubSpot private-app token (conversations read; contacts/deals read-write)", "Azure OpenAI deployment (GPT-4o-mini)", "n8n cloud workspace", "Microsoft 365 OAuth credential (SharePoint file read-write, mail send)"], "setup_time": "~2\u20133 weeks including pilot", "onesheet_html": "<h3>Overview</h3>\n<p>A production AI customer agent for a global HR-tech (EOR) platform (~500 employees, hiring in 160+ countries) \u2014 built end to end by one person: the agent itself (versioned conversation guidelines, guardrails, knowledge base, routing), a live AI qualification pipeline that classifies every closed chat as MQL or Not under strict governance rules, a three-workflow reporting warehouse, and a three-tier deal-attribution layer. Live on the pricing page since launch. Headline result: a visitor chatted one day, the pipeline stamped an MQL, and a rep opened a <strong>quarter-million-dollar deal the next day</strong> \u2014 traceable to the exact conversation. <strong>Over $500K in agent-sourced deal value</strong> in the first four months.</p>\n<h3>The Problem</h3>\n<p>The company needed an AI agent on its website that qualifies visitors, feeds the CRM cleanly, and \u2014 the hard part \u2014 can <em>prove</em> its revenue impact. Chatbot leads were unattributed, duplicated, and contaminated by hundreds of legacy pre-launch contacts, so nobody could answer &quot;what is the chatbot worth?&quot;</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>HubSpot Customer Agent (Breeze)</strong> \u2014 HubSpot&#x27;s native AI chat product \u2014 runs the agent on the pricing page under versioned conversation guidelines governing what it says and when it routes to sales, partners, or support.</li>\n<li>On every closed conversation, a webhook fires an <strong>n8n</strong> qualification workflow (4,146 logged executions) \u2014 n8n is a visual workflow-automation platform that orchestrates the whole pipeline.</li>\n<li>A hand-written <strong>JavaScript normalizer</strong> strips HTML, orders messages, distinguishes visitor from bot by actor ID, and extracts email/phone/company from free text with personal-domain filtering \u2014 deterministic cleanup before any AI sees the data.</li>\n<li>An <strong>Azure OpenAI GPT-4o-mini</strong> agent (Microsoft-hosted OpenAI model) with a structured-output parser classifies MQL vs Non-MQL under authored rules: only visitor messages count as intent; confidence &lt; 0.65 forces Non-MQL; blank values never overwrite existing CRM data. MQLs get lifecycle + 15 chatbot properties stamped via the <strong>HubSpot CRM APIs</strong>, plus a drafted follow-up email.</li>\n<li>A <strong>three-workflow reporting warehouse</strong> \u2014 webhook event collector, daily reconciliation job, and hourly AI-credit watcher (4-tier thresholds: 60/75/85/90%) \u2014 writes to a five-table SharePoint Excel workbook via <strong>Microsoft Graph</strong>, Microsoft&#x27;s API for Office 365 files and mail.</li>\n<li>A <strong>deal-attribution walk</strong> (deal \u2192 contact \u2192 chatbot properties) assigns three honesty tiers \u2014 sourced, influenced, excluded \u2014 operationalized as a weekly n8n stamper writing attribution tier + originating conversation onto deals, report-only until sign-off.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>HubSpot Customer Agent (Breeze)</td><td>The visitor-facing agent</td><td>Portal admin (chatflows, knowledge base)</td></tr>\n<tr><td>n8n cloud</td><td>Pipeline orchestration (LangChain agent nodes)</td><td>n8n workspace; workflow import rights</td></tr>\n<tr><td>Azure OpenAI (GPT-4o-mini)</td><td>MQL classification + email drafting</td><td>Azure OpenAI deployment + API credential</td></tr>\n<tr><td>HubSpot Conversations + CRM v3/v4 APIs</td><td>Threads, contacts, deals, property writes</td><td>Private-app token: conversations read, contacts/deals read-write</td></tr>\n<tr><td>Microsoft Graph</td><td>SharePoint Excel warehouse + Outlook alerts</td><td>OAuth2: file read-write, mail send</td></tr>\n<tr><td>Python dashboard</td><td>Local reporting views</td><td>Read access to warehouse workbook</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Configure the Customer Agent chatflow, knowledge base, and conversation guidelines in HubSpot.</li>\n<li>Run the property-creation script to create the custom chatbot contact properties (idempotent \u2014 skips existing).</li>\n<li>Build the attribution stamp workflow in HubSpot (engagement flag + source, never overwriting native source fields).</li>\n<li>Import the MQL classification workflow JSON into n8n; bind HubSpot private-app and Azure OpenAI credentials; wire the shared error workflow.</li>\n<li>Register the conversation-close webhook; deploy the warehouse workflows and SharePoint workbook.</li>\n<li>Dry-run on a sample of closed conversations; verify stamps on live contacts before enabling writes.</li>\n<li>Deploy the attribution stamper in report-only mode; enable deal writes only after sign-off.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>HubSpot portal with Customer Agent (Breeze) enabled + private-app token</li>\n<li>Azure OpenAI deployment (GPT-4o-mini)</li>\n<li>n8n cloud workspace; Microsoft 365 (SharePoint + Outlook) OAuth credential</li>\n<li>Workflow JSONs + property script \u00b7 <strong>Time-to-deploy: ~2\u20133 weeks</strong> including pilot</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li><strong>A quarter-million-dollar open deal sourced by the agent</strong> \u2014 visitor chat one day, rep-opened deal the next, traced to the exact originating conversation</li>\n<li><strong>Over $500K in agent-sourced deal value</strong> in the first four months; <strong>~$680K</strong> year-to-date closed-won on chatbot-engaged contacts (influence tier)</li>\n<li><strong>~$3.6M lifetime deal value</strong> across ~390 chatbot-engaged contacts; 4,146 logged pipeline executions</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li>Hundreds of legacy pre-launch contacts contaminated metrics \u2192 excluded tier + launch-era cutoff; even a lost first-attributed deal stays counted (influence, not cherry-picking)</li>\n<li>Webhook-only reporting missed late closures \u2192 hybrid design: webhook collector <em>and</em> daily reconciliation rebuild</li>\n<li>Over-eager AI classification risk \u2192 confidence gate (&lt;0.65 = Non-MQL), visitor-messages-only intent, never-overwrite rule</li>\n<li>&quot;Why did this chat not create a contact?&quot; \u2192 reconciliation-gap metric answered by transcript email search</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>Full-stack AI product ownership (agent \u2192 pipeline \u2192 warehouse \u2192 attribution) \u00b7 LLM governance rails in a production CRM \u00b7 revenue-attribution design \u00b7 executive-grade reporting.</p>", "type_label": "AI Agent System", "color": "#8a6d3b", "portfolio_blurb": "A global HR-tech (EOR) platform needed an AI agent that could qualify website visitors and prove its own revenue impact, not just chat. Built end to end \u2014 agent, qualification pipeline, reporting warehouse, and a three-tier attribution model \u2014 it sourced a $250K deal traceable to a single conversation and $520K+ in attributed pipeline within four months.", "demonstrates_short": "Full-stack AI product ownership", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "msa-docusign-automation", "name": "Contract Intake Automation (DocuSign)", "tagline": "From CRM deal to submitted DocuSign contract intake in under 3 minutes.", "category": "Sales Automation", "type": "AI Agent System", "status": "Live in production", "price": "Free", "tags": ["Claude Skill", "n8n", "DocuSign", "HubSpot", "Playwright", "Browser Automation", "Human-in-the-loop"], "headline_metric": "CRM deal to submitted contract intake in under 3 minutes", "description_short": "Chat-driven contract intake: paste a HubSpot deal URL, confirm three steps, upload the document \u2014 an n8n pipeline and a Playwright fill worker submit Legal's DocuSign form for you.", "description_long": "Built at a global HR-tech (EOR) platform (~500 employees, operating in 160+ countries), where sellers used to hand-copy deal data from HubSpot into Legal's DocuSign Agreement Desk intake form \u2014 slow, typo-prone, and any error stalled contracting. This system turns the whole thing into a chat: paste a HubSpot deal URL, confirm three friendly steps, upload the contract document, done. An n8n webhook validates and maps every value to Legal's exact form schema, and a Playwright fill worker submits the form as a service account \u2014 firing Legal's DocuSign Maestro workflow natively, with Legal's process completely untouched. CRM deal \u2192 filled intake in under 3 minutes.", "integrations": ["HubSpot (MCP)", "n8n Cloud", "DocuSign Agreement Desk", "DocuSign Maestro", "Playwright fill worker (Docker)", "Claude in Chrome (fallback)"], "requirements": ["n8n Cloud instance with DocuSign OAuth2 credential", "DocuSign service account + Docker host for the fill worker", "HubSpot MCP with deal/company/contact read access", "Legal's DocuSign form and Maestro workflow identifiers"], "setup_time": "~half a day including live tests", "onesheet_html": "<h3>Overview</h3>\n<p>Built at a global HR-tech (EOR) platform (~500 employees, operating in 160+ countries), where sellers used to hand-copy deal data from HubSpot into Legal&#x27;s DocuSign Agreement Desk intake form \u2014 slow, typo-prone, and any error stalled contracting. This system turns the whole thing into a chat: paste a HubSpot deal URL, confirm three friendly steps, upload the contract document, done. An n8n webhook validates and maps every value to Legal&#x27;s exact form schema, and a Playwright fill worker submits the form as a service account \u2014 firing Legal&#x27;s DocuSign Maestro workflow natively, with Legal&#x27;s process completely untouched. CRM deal \u2192 filled intake in under 3 minutes.</p>\n<h3>The Problem</h3>\n<p>Legal&#x27;s contract intake lives in DocuSign Agreement Desk, triggered only by a form submission. Sellers re-typed nine-plus fields from HubSpot by hand; a wrong region or fee figure meant a stalled contract and a Legal round-trip. Two &quot;obvious&quot; API integrations turned out to be blocked by DocuSign itself, so the automation had to go through the only open door: the form UI.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>Seller pastes a HubSpot deal URL</strong> into Claude \u2014 the skill pulls deal, company, and all associated contacts via the HubSpot MCP (Claude&#x27;s live connection to the CRM).</li>\n<li><strong>Three confirmation steps</strong> \u2014 deal details block, signer selection (multi-contact aware), redline yes/no. Nothing is submitted that a human hasn&#x27;t reviewed.</li>\n<li><strong>Seller uploads the contract document</strong> (doc/docx/pdf, \u226425MB); the skill encodes it into the payload.</li>\n<li><strong>POST to an n8n webhook</strong> \u2014 n8n, the orchestration layer, validates every field and maps raw CRM values to Legal&#x27;s exact form schema (region labels, client status, currency), returning readable 400 errors that name the broken field.</li>\n<li><strong>The fill worker submits</strong> \u2014 a Playwright (headless browser automation) service logs into DocuSign as a dedicated intake-bot service account, fills the Agreement Desk form, attaches the document, and submits. Submission natively triggers Legal&#x27;s Maestro review workflow.</li>\n<li><strong>Fallback path</strong> \u2014 if the worker is down, n8n returns a validated prefill array and the skill fills the form in the seller&#x27;s own logged-in browser, never touching the upload or Submit button; last resort is a copy-paste block.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>Claude Skill</td><td>Intake, CRM pull, 3-step seller validation</td><td>HubSpot MCP connection (read deals/companies/contacts)</td></tr>\n<tr><td>n8n Cloud</td><td>Validate &amp; map payload to form schema; structured 4xx errors</td><td>Webhook endpoint; DocuSign OAuth2 credential stored in n8n</td></tr>\n<tr><td>Playwright fill worker (Docker, cloud-hosted)</td><td>Logs in as service account, fills + submits the form</td><td>DocuSign service-account credentials, vaulted server-side \u2014 never in the skill or n8n</td></tr>\n<tr><td>DocuSign Agreement Desk + Maestro</td><td>Legal-owned intake form and review workflow</td><td>None to change \u2014 triggered natively by form submission</td></tr>\n<tr><td>Browser automation (Claude in Chrome)</td><td>Fallback fill in seller&#x27;s session</td><td>Seller&#x27;s own logged-in browser; skill never clicks Submit</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Import the worker workflow JSON into n8n; bind the DocuSign OAuth2 credential to the HTTP nodes (imports drop bindings).</li>\n<li>Deploy the fill worker container to your cloud host; vault the service-account credentials there.</li>\n<li>Install the Claude skill for sellers; confirm the HubSpot MCP is connected.</li>\n<li>Dry-run: POST a documented test payload to the webhook test URL; expect a success response and a test instance in Legal&#x27;s queue.</li>\n<li>Negative test: send an invalid field; expect a readable 400 naming it.</li>\n<li>Cut over: deactivate the old workflow, activate the new one on the same webhook path \u2014 the skill contract is unchanged. Keep the fallback workflows archived for rollback.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] n8n Cloud instance + DocuSign OAuth2 credential</li>\n<li>[ ] DocuSign service account for the worker; any Docker host for deployment</li>\n<li>[ ] HubSpot MCP with deal/company/contact read access</li>\n<li>[ ] Legal&#x27;s DocuSign form and Maestro workflow identifiers</li>\n<li>[ ] Time to deploy: ~half a day including live tests</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li>CRM deal \u2192 filled, submitted intake in <strong>under 3 minutes</strong> (was a manual re-typing chore).</li>\n<li><strong>Legal&#x27;s process untouched</strong> \u2014 their Maestro workflow fires exactly as designed; nothing sent for signature by the skill.</li>\n<li>Sellers need <strong>nothing installed</strong>; errors are always readable 4xx JSON.</li>\n<li>Two blocked API paths archived and documented, ready if DocuSign ever opens the endpoints \u2014 vendor escalation path defined with the exact request ID.</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>&quot;Form not found&quot; in production</strong> \u2192 live workflow had drifted from its backup, losing a query parameter, and name-based form lookup was fragile \u2192 removed the lookup entirely; form ID hardcoded.</li>\n<li><strong>DocuSign Web Forms createInstance returned 500 on every payload</strong> \u2192 Agreement Desk intake forms aren&#x27;t API-instantiable by DocuSign design \u2192 stopped iterating payloads, pivoted architecture to UI fill.</li>\n<li><strong>Maestro Trigger API returned 400</strong> \u2192 external triggering of Agreement-Desk workflows is disallowed, confirmed with request IDs \u2192 archived that path, defined vendor escalation.</li>\n<li><strong>Sellers saw Cloudflare &quot;Bad gateway&quot; instead of errors</strong> \u2192 n8n&#x27;s 502s get their bodies swallowed by Cloudflare \u2192 all errors moved to 4xx structured JSON.</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>Constraint-driven architecture \u00b7 agentic browser automation with human-in-the-loop by design \u00b7 vendor API forensics \u00b7 security-first credential handling.</p>", "type_label": "AI Agent System", "color": "#8a6d3b", "portfolio_blurb": "Sellers were hand-copying deal data into a legal contract-intake form, and any typo stalled the deal. After two 'obvious' API integrations were proven blocked by the vendor itself, the automation pivoted to the one door left open \u2014 bringing intake time from a manual chore down to under 3 minutes.", "demonstrates_short": "Constraint-driven architecture", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "eor-compliance-checker", "name": "EOR Compliance Checker", "tagline": "AI deal screening on the live sales pipeline: every deal gets an auditable compliance verdict the moment it enters.", "category": "Compliance", "type": "n8n Workflow", "status": "Live in production", "price": "Free", "tags": ["n8n", "Azure OpenAI", "HubSpot", "Avoma", "compliance", "rules engine"], "headline_metric": "100+ deals wrongly stuck in review correctly cleared; zero production write errors", "description_short": "Automated compliance screening for every deal entering the pipeline \u2014 an LLM maps messy CRM data, a unit-tested rules engine makes the deterministic call, and the verdict writes back with full audit trail.", "description_long": "An automated compliance-screening system that evaluates every deal entering a global HR-tech (EOR) platform's sales pipeline against the company's official 30-sector compliance worksheet, and writes an auditable verdict back to the CRM. An LLM handles only the fuzzy work (mapping messy CRM data to canonical sectors); a unit-tested JavaScript rules engine makes every tier decision deterministically. Result: all open deals in the pipeline screened, over a hundred deals wrongly stuck in 'review required' correctly cleared while ineligible-deal detection more than doubled \u2014 every verdict traceable to a named rule, with a perfect production write record.", "integrations": ["n8n", "Azure OpenAI", "HubSpot", "Avoma", "Outlook"], "requirements": ["CRM private-app token (deals/contacts/notes read-write)", "n8n cloud workspace", "Enterprise LLM deployment (e.g. Azure OpenAI GPT-4)", "Call-intelligence API key (e.g. Avoma)", "Email/mail OAuth credential", "A written sector-by-sector compliance worksheet"], "setup_time": "~1 week (incl. dry-run validation)", "onesheet_html": "<h3>Overview</h3>\n<p>An automated compliance-screening system that evaluates every deal entering a global HR-tech (EOR) platform&#x27;s sales pipeline against the company&#x27;s official 30-sector compliance worksheet, and writes an auditable verdict back to the CRM. An LLM handles only the fuzzy work (mapping messy CRM data to canonical sectors); a unit-tested JavaScript rules engine makes every tier decision deterministically. Result: all open deals in the pipeline screened, over a hundred deals wrongly stuck in &quot;review required&quot; correctly cleared while ineligible-deal detection more than doubled \u2014 every verdict traceable to a named rule, with a perfect production write record.</p>\n<h3>The Problem</h3>\n<p>Deals reached contracting and KYC before anyone checked whether the role or industry was even eligible for Employer-of-Record services \u2014 compliance found blockers at signature time, killing deals late, wasting effort, and eroding trust. Screening was ad-hoc and reactive.</p>\n<h3>How It Works</h3>\n<ol>\n<li>A CRM deal workflow fires on pipeline entry and posts the deal ID to an <strong>n8n</strong> webhook \u2014 n8n is a workflow-automation platform running the screening pipeline (46 nodes).</li>\n<li>n8n re-fetches everything authoritative by ID via the <strong>CRM API</strong>: deal, contacts (job titles), notes, company \u2014 plus call transcripts from a conversation-intelligence tool that records sales calls.</li>\n<li>An <strong>enterprise-hosted LLM</strong> does <em>semantic mapping only</em>: reading messy CRM values (&quot;Computer Software&quot; \u2248 &quot;Software Development&quot;) and pass-through detection (a staffing firm placing oil &amp; gas workers is screened as oil &amp; gas).</li>\n<li>A <strong>deterministic JavaScript matrix engine</strong> \u2014 the 30-sector worksheet transcribed into unit-tested code \u2014 applies three independent judgments: viability tier (1/2/3), preliminary flags (executive role / legal-entity conflict), and hard screens (licenses, union-CBA, security clearance) that force Tier 3. Confidence is a report field; it never changes the tier.</li>\n<li>The verdict is written to five CRM deal properties (tier, eligibility flag, preliminary flag, screen-required flag, notes with cited evidence), and the deal owner gets an email notification if Tier 2/3.</li>\n<li>An hourly n8n safety-net sweep screens any open deal still missing a tier \u2014 a zero-blank guarantee even if a real-time event is missed.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>n8n cloud</td><td>Orchestration \u2014 webhook, batch, dry-run, and hourly-sweep workflows</td><td>Workspace + workflow import</td></tr>\n<tr><td>Enterprise LLM (GPT-4 class)</td><td>Semantic sector mapping + note prose only</td><td>Deployment + API credential</td></tr>\n<tr><td>Custom JS rules engine</td><td>Deterministic tiers, gates, alias resolution</td><td>Ships inside the workflow</td></tr>\n<tr><td>CRM API (HubSpot)</td><td>Deal/contact/note/company reads; property writes</td><td>Private-app token: deals + contacts read-write</td></tr>\n<tr><td>Call-intelligence API</td><td>Call transcripts &amp; summaries</td><td>API key, read-only</td></tr>\n<tr><td>Email (Outlook)</td><td>Owner notifications on Tier 2/3</td><td>OAuth (mail send)</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Create the five compliance deal properties in your CRM.</li>\n<li>Import the three workflow JSONs (webhook, batch updater, report-only tester) into n8n; bind CRM, LLM, call-intelligence, and email credentials.</li>\n<li>Build the CRM deal workflow: enroll on target stages, &quot;Send a webhook&quot; action posting the deal ID to the n8n URL.</li>\n<li>Run the <strong>report-only dry-run harness</strong> against all open deals \u2014 zero CRM writes \u2014 and validate the tier distribution.</li>\n<li>Run the batch updater to screen the full pipeline; verify sample writes per tier.</li>\n<li>Enable the production webhook + hourly sweep; park the previous version off (not deleted) as instant rollback.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>CRM private-app token (deals/contacts/notes read-write); n8n cloud workspace</li>\n<li>Enterprise LLM deployment; call-intelligence API key; email/mail credential</li>\n<li>The official sector-by-sector compliance worksheet (source of the rules) \u00b7 <strong>Time-to-deploy: ~1 week</strong> including dry-run validation</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li><strong>Live in production</strong>; hundreds of open deals screened across the full pipeline</li>\n<li><strong>Over 100 deals wrongly stuck in &quot;review required&quot; correctly cleared</strong>; ineligible-deal detection more than doubled, all traceable to a named worksheet trigger</li>\n<li><strong>Perfect production write record</strong> (zero errors); full unit-test coverage; well over 100 correct tier-downgrade regression moves; final portfolio reached zero &quot;Insufficient Data&quot; verdicts after an alias-resolution upgrade</li>\n<li>Live end-to-end validation on a real deal: dozens of nodes, zero errors</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li>Most &quot;Insufficient Data&quot; verdicts \u2192 root cause: contacts were never fetched in earlier versions \u2192 contact-fetch chain added</li>\n<li>Over-conservative tiers \u2014 thin data demoted clean sectors \u2192 re-architecture: confidence reports but never changes the tier</li>\n<li>A variable-reassignment bug surfaced on the first live production test \u2192 caught by the verification step, fixed same day, re-test passed</li>\n<li>Several analytics properties didn&#x27;t exist in the CRM and silently failed writes \u2192 folded into the notes field</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>LLM + deterministic hybrid design \u00b7 regulated-domain AI with full audit trails \u00b7 zero-risk deployment methodology (dry-run harness, rollback parking) \u00b7 multi-API orchestration.</p>", "type_label": "Automation Workflow", "color": "#8b4a3f", "portfolio_blurb": "Deals were reaching contracting before anyone checked whether the role or industry was even eligible for the company's core service, killing deals late. An LLM-plus-rules-engine screening system now evaluates every deal on entry, correctly clearing 100+ deals stuck in manual review and doubling detection of ineligible deals with a perfect production write record.", "demonstrates_short": "Regulated-domain AI with audit trails", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "hubspot-import-formatter", "name": "HubSpot Import Formatter", "tagline": "Killing CRM duplicates at the source \u2014 any rep spreadsheet becomes a clean HubSpot import in minutes.", "category": "Data Quality", "type": "Claude Skill", "status": "Live in production", "price": "Free", "tags": ["Claude Skill", "HubSpot", "NAICS", "dedup", "CRM hygiene"], "headline_metric": "Live for a 50+ rep GTM org \u2014 every import Batch-ID tagged and KPI-tracked", "description_short": "Converts any rep spreadsheet (data-vendor exports, social-selling lists, partner lists) into clean, deduped, NAICS-enriched CRM import templates \u2014 with a rejects tab so nothing silently disappears.", "description_long": "Reps at a global HR-tech (EOR) platform bulk-imported hand-made spreadsheets in inconsistent formats, and the CRM couldn't dedupe reliably, polluting records with duplicates and splitting activity history. This Claude skill converts any rep spreadsheet into official import templates: auto-splitting people from companies, deduping pre-import, semantically mapping messy industry values enriched with NAICS sector + code, normalizing dropdowns and countries, flagging rejected rows, and optionally upserting directly to the CRM.", "integrations": ["Claude Skill", "HubSpot", "Excel/CSV"], "requirements": ["Claude Code or Claude access for the team", "An official import template schema", "Optional: CRM private-app token (contacts/companies read-write, imports API)"], "setup_time": "~2-3 hours to configure and pilot", "onesheet_html": "<h3>Overview</h3>\n<p>Reps at a global HR-tech (EOR) platform bulk-imported hand-made spreadsheets in inconsistent formats \u2014 data-vendor exports, social-selling lists, partner lists \u2014 and the CRM couldn&#x27;t dedupe reliably, polluting records with duplicate contacts and companies, inflating forecasts, and splitting activity history. This Claude skill converts any rep spreadsheet into the company&#x27;s official import templates: auto-splitting people from companies, deduping pre-import, semantically mapping messy industry values to the CRM&#x27;s taxonomy enriched with NAICS sector + code, normalizing dropdowns and countries, flagging (never silently dropping) rejected rows, and optionally upserting directly to the CRM with static/active list creation. Live for a 50+-person GTM org, with every import tagged by a Batch ID so data-quality discipline is reportable back to deal attribution.</p>\n<h3>The Problem</h3>\n<p>Reps at a global HR-tech (EOR) platform bulk-imported hand-made spreadsheets in wildly inconsistent formats. The CRM&#x27;s native dedupe couldn&#x27;t catch near-matches across formats, so it filled with duplicate contacts and companies \u2014 inflating pipeline forecasts and splitting activity/engagement history across records that should have been one.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>Ingest any spreadsheet</strong> \u2014 a rep uploads a data-vendor, social-selling, or partner-list export in whatever shape it arrived (Claude skills are reusable, packaged instruction sets that run inside Claude/Claude Code).</li>\n<li><strong>Auto-split people from companies</strong> \u2014 the skill detects whether rows are person-level, company-level, or mixed, and separates them into the CRM&#x27;s two-object model.</li>\n<li><strong>Pre-import dedupe</strong> \u2014 records are deduped against the upload batch itself and (when upserting live) against existing CRM records, before anything touches the system of record.</li>\n<li><strong>Semantic industry mapping</strong> \u2014 messy free-text industry values are mapped to the CRM&#x27;s official industry taxonomy and enriched with the matching <strong>NAICS sector + code</strong> \u2014 the US government&#x27;s standard industry classification, which most CRMs don&#x27;t natively carry.</li>\n<li><strong>Normalization</strong> \u2014 country names, state/province codes, and dropdown-field values are standardized to exactly what the CRM&#x27;s properties expect, so imports don&#x27;t silently fail on mismatched picklist values.</li>\n<li><strong>Flag, never drop</strong> \u2014 any row that can&#x27;t be confidently mapped or deduped is flagged in a rejects tab with a reason, so nothing disappears without a human seeing why.</li>\n<li><strong>Deliver two ways</strong> \u2014 export official import-ready Excel/CSV templates for manual upload, or (if authorized) upsert directly to the CRM via the import API with automatic static/active list creation, tagging the import with a <strong>Batch ID</strong> used as the CRM import name.</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>Claude skill</td><td>Ingest, split, dedupe, map, normalize logic</td><td>Claude Code / Claude with skill installed</td></tr>\n<tr><td>Excel/CSV processing</td><td>Reads rep exports, writes official import templates</td><td>Local file access</td></tr>\n<tr><td>NAICS mapping layer</td><td>Sector + code enrichment on industry values</td><td>Ships with the skill (static reference table)</td></tr>\n<tr><td>CRM import API (HubSpot)</td><td>Optional direct upsert + static/active list creation</td><td>Private-app token scoped to contacts/companies + imports</td></tr>\n<tr><td>Run ledger</td><td>Tracks adoption, volume, data-quality KPIs per Batch ID</td><td>Local file or CRM custom object</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Install the skill into the team&#x27;s Claude Code / Claude environment.</li>\n<li>Load your official import template schema and an industry-to-NAICS mapping table (ships with the skill; extend as needed).</li>\n<li>Configure the CRM private-app token if direct upsert is wanted (read/write contacts + companies, imports API); otherwise the skill exports templates only.</li>\n<li>Run a test import from a real rep spreadsheet in &quot;export only&quot; mode; review the rejects tab.</li>\n<li>Enable direct upsert for a pilot team; confirm Batch IDs appear as CRM import names and the run ledger logs volume/quality.</li>\n<li>Roll out to the full GTM org with a short rep-facing how-to.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] Claude Code or Claude access for the team</li>\n<li>[ ] An official import template schema (or your own equivalent)</li>\n<li>[ ] Optional: CRM private-app token (contacts/companies read-write, imports API) for direct upsert</li>\n<li>[ ] ~2\u20133 hours to configure and pilot; minutes per import thereafter</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li><strong>Live for a 50+-person GTM org.</strong></li>\n<li>Every import carries a Batch ID used as the CRM import name \u2014 deal attribution back to clean-data discipline is reportable.</li>\n<li>Built-in run ledger tracks adoption, volume, and data-quality KPIs over time.</li>\n<li>Root-cause fix for CRM duplication rather than a downstream cleanup tool.</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>Inconsistent source formats across vendors</strong> \u2192 auto-detection of person vs. company rows instead of requiring a fixed template from reps.</li>\n<li><strong>Free-text industry values that the CRM&#x27;s picklist can&#x27;t match</strong> \u2192 semantic mapping layer enriched with NAICS sector + code.</li>\n<li><strong>Silent import failures on bad dropdown values</strong> \u2192 explicit normalization pass before export/upsert.</li>\n<li><strong>Risk of quietly dropping unmappable rows</strong> \u2192 every uncertain row flagged in a rejects tab with a reason, never silently discarded.</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>Root-cause data-quality engineering \u00b7 adoption-aware design (make the standard the easy path) \u00b7 measurable-by-default tooling \u00b7 semantic-to-deterministic mapping (LLM interprets messy text, static taxonomy governs the outcome).</p>", "type_label": "Claude Skill", "color": "#4a6b8a", "portfolio_blurb": "Inconsistent rep-uploaded spreadsheets were polluting the CRM with duplicate contacts and companies, inflating pipeline forecasts. A skill now converts any spreadsheet into clean, deduped, NAICS-enriched import templates, live across a 50+ person team with adoption tracked by a run ledger.", "demonstrates_short": "Root-cause data-quality engineering", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, like compliance tiers or money. The system never just &quot;lets the AI decide&quot; on a consequential call. <strong>Production discipline</strong> \u2014 every build ships with dry-run tests, rollback plans, and shared error handling, because these systems run unattended on live revenue pipelines, not in a sandbox. <strong>Cost engineering</strong> \u2014 AI and data-enrichment spend gets measured and capped by design, not by asking people to be careful. <strong>Platform building</strong> \u2014 beyond any single automation, the real product is a reusable skill library, a project-intake system, and a build standard so the work compounds instead of resetting with every new request.</p>\n<p>The result is a portfolio that reads less like a collection of scripts and more like a small internal product organization: an AI agent with its own attribution model, a compliance engine with full audit trails, a cost-governance framework that turned an owned mistake into a permanent safeguard, and the standards layer that let one person&#x27;s work scale across fifty.</p>"}, {"slug": "partner-pql-automation", "name": "Partner PQL Automation", "tagline": "AI lead classification & routing \u2014 genuine partnership leads reach a human; vendor spam never does.", "category": "RevOps", "type": "n8n Workflow", "status": "Live in production", "price": "Free", "tags": ["n8n", "Azure OpenAI", "HubSpot", "lead routing", "classification"], "headline_metric": "Live \u2014 AI-drafted responses reach only genuine leads; vendor spam filtered with zero manual triage", "description_short": "Classifies partner-form submissions with an LLM, stamps CRM lifecycle and properties, and routes only genuine partnership leads to a high-priority task with an AI-drafted response.", "description_long": "A global HR-tech (EOR) platform's partner-inquiry form mixed genuine partnership leads with vendor spam, and everything landed on one person to triage by hand. This webhook-triggered n8n workflow classifies every submission with an enterprise LLM, stamps CRM properties and lifecycle stage, creates a high-priority task with an AI-drafted response for the partnerships owner on real leads \u2014 and politely filters vendor pitches with no task and no email.", "integrations": ["n8n", "Azure OpenAI", "HubSpot"], "requirements": ["n8n workspace with webhooks enabled", "Enterprise LLM deployment + API credential", "CRM private-app token (contacts/companies read-write, tasks, owner routing)", "A defined partnerships owner to route tasks to"], "setup_time": "~2-3 hours", "onesheet_html": "<h3>Overview</h3>\n<p>A global HR-tech (EOR) platform&#x27;s partner-inquiry form mixed genuine partnership leads (referral, alliance, integration) with vendor spam, and everything landed on one person to triage by hand. This webhook-triggered n8n workflow classifies every submission with an enterprise LLM, stamps CRM properties and lifecycle stage, creates a high-priority task with an AI-drafted response for the partnerships owner on real leads \u2014 and politely filters vendor pitches with no task and no email, so a human&#x27;s attention is spent only where it matters.</p>\n<h3>The Problem</h3>\n<p>Partner-form submissions on the company website mixed real partnership opportunities with vendor pitches (agencies, tool sellers, cold outreach disguised as &quot;partnership inquiries&quot;). Every submission funneled to one person to manually read, classify, and respond to \u2014 a bottleneck that also meant real leads sometimes waited behind spam.</p>\n<h3>How It Works</h3>\n<ol>\n<li><strong>Webhook trigger</strong> \u2014 the partner-inquiry form POSTs directly into n8n (a workflow-automation platform) the moment it&#x27;s submitted, no polling delay.</li>\n<li><strong>AI classification</strong> \u2014 an enterprise LLM reads the submission and classifies partner type: referral, alliance, integration, or vendor pitch \u2014 the four buckets that determine what happens next.</li>\n<li><strong>CRM stamping</strong> \u2014 properties and lifecycle stage are written to the associated contact/company record via the CRM API, so the classification lives on the record permanently, not just in an email.</li>\n<li><strong>Routing on genuine leads</strong> \u2014 for referral/alliance/integration leads, a high-priority task is created and assigned to the partnerships owner, paired with an AI-drafted first-response email ready to send or edit.</li>\n<li><strong>Silent filtering on vendor spam</strong> \u2014 pitches classified as vendor spam get no task and no email \u2014 filtered politely with zero human time spent, rather than dumped in someone&#x27;s queue.</li>\n<li><strong>Shared error handling</strong> \u2014 the workflow is wired into the team&#x27;s standard shared error-handler workflow, so a failure here surfaces the same way every other automation&#x27;s failures do (not a silent, one-off gap).</li>\n</ol>\n<h3>Stack &amp; Integrations</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>Tool</th><th>Role</th><th>Access needed</th></tr></thead><tbody>\n<tr><td>n8n</td><td>Webhook trigger + orchestration</td><td>n8n workspace, webhook enabled</td></tr>\n<tr><td>Enterprise LLM (Azure OpenAI)</td><td>Partner-type classification + AI-drafted response generation</td><td>Deployment + API credential</td></tr>\n<tr><td>CRM API (HubSpot)</td><td>Contact/company properties, lifecycle stage, task creation, owner routing</td><td>Private-app token (contacts/companies read-write, tasks, owners)</td></tr>\n<tr><td>Shared error-handler workflow</td><td>Standardized failure alerting across the automation stack</td><td>Internal n8n workflow reference</td></tr>\n</tbody></table></div>\n<h3>Setup Process</h3>\n<ol>\n<li>Import the workflow JSON into n8n; bind LLM and CRM credentials.</li>\n<li>Point the partner-inquiry form&#x27;s webhook at the n8n trigger URL.</li>\n<li>Create/confirm the CRM properties the workflow stamps (partner type, lifecycle stage) and the task-owner assignment rule.</li>\n<li>Wire the workflow into the shared error-handler pattern used across the automation stack.</li>\n<li>Run the three included test payloads (valid partner, vendor spam, alliance) to confirm expected behavior before the form goes live.</li>\n<li>Activate; monitor the first week of live submissions against the classification.</li>\n</ol>\n<h3>What You Need</h3>\n<ul>\n<li>[ ] n8n workspace with webhooks enabled</li>\n<li>[ ] Enterprise LLM deployment + API credential</li>\n<li>[ ] CRM private-app token (contacts/companies read-write, tasks, owner routing)</li>\n<li>[ ] A defined partnerships owner to route tasks to</li>\n<li>[ ] ~2\u20133 hours to deploy and test against sample payloads</li>\n</ul>\n<h3>Results</h3>\n<ul>\n<li><strong>Live in production.</strong> High-priority tasks with AI-drafted responses reach the partnerships owner only for genuine partnership leads; vendor pitches are filtered with zero manual triage.</li>\n<li>Shipped with three curl test payloads (valid partner / vendor spam / alliance) that defined expected behavior <em>before</em> the form went live \u2014 test-first deployment.</li>\n<li>Fixed a CRM API version-mismatch bug pre-launch that would have silently created tasks with no contact attached.</li>\n</ul>\n<h3>Challenges &amp; Fixes</h3>\n<ul>\n<li><strong>CRM API version change (an internal ID field renamed)</strong> \u2192 would have silently created orphaned tasks (no contact attached) \u2192 caught and fixed in the deploy guide before go-live.</li>\n<li><strong>Node reordering risk breaking references</strong> \u2192 hardened node references so the workflow survives being rearranged during future edits.</li>\n<li><strong>No test coverage for a form that hadn&#x27;t launched yet</strong> \u2192 three curl payloads (valid partner / vendor spam / alliance) authored to define and verify expected behavior before real traffic arrived.</li>\n<li><strong>Failures needing a consistent alerting path</strong> \u2192 wired into the team&#x27;s shared error-handler workflow instead of a one-off try/catch.</li>\n</ul>\n<h3>Demonstrates</h3>\n<p>LLM classification in a production CRM path \u00b7 defensive integration coding (catching an API version mismatch before it silently corrupted data) \u00b7 test-first deployment discipline.</p>", "type_label": "Automation Workflow", "color": "#3d6b5c", "portfolio_blurb": "A partner-inquiry form mixed genuine partnership leads with vendor spam, and everything landed on one person to triage by hand. An LLM now classifies every submission and routes only real leads to a high-priority task with an AI-drafted response, filtering spam with zero manual effort.", "demonstrates_short": "LLM classification in production CRM", "about_html": "<p>Patrick Diamitani owns AI strategy and automation across an entire go-to-market organization \u2014 sales, marketing, and revenue operations \u2014 at a global HR-tech (Employer of Record) platform with roughly 500 employees operating in 160+ countries. His mandate: build production systems that a non-technical team of 50+ reps and marketers can rely on daily, not demos that impress once and then quietly stop being used.</p>\n<p>Four themes run through everything in this library. <strong>Hybrid AI architecture</strong> \u2014 large language models handle what they&#x27;re good at (reading messy text, drafting, classification), while deterministic, unit-tested code handles anything that must be auditable, lik
